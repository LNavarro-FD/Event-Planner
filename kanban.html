<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Kanban v3.6.4 — FD7 Kanban</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}


/* Top bar */
#topbar{background:#0f172a;color:#fff;padding:0 16px;height:44px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#topbar h1{font-size:14px;font-weight:700}
.topbtn{font-size:11px;padding:3px 10px;border:1px solid #334155;border-radius:4px;background:transparent;color:#94a3b8;cursor:pointer}
.topbtn.active,.topbtn:hover{background:#1e40af;color:#fff;border-color:#1e40af}
#topbar .spacer{flex:1}
#userEmail{font-size:11px;color:#64748b}

/* View tabs */
#viewTabs{background:#1e293b;display:flex;gap:0;flex-shrink:0}
.vtab{padding:8px 20px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.05em}
.vtab:hover{color:#cbd5e1}
.vtab.active{color:#3b82f6;border-bottom-color:#3b82f6}

/* Stats bar */
#statsbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:6px 16px;display:flex;gap:20px;flex-shrink:0;align-items:center}
.stat{font-size:11px;display:flex;align-items:center;gap:5px;color:#64748b}
.stat strong{color:#0f172a}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#filterBar{margin-left:auto;display:flex;gap:8px;align-items:center}
#filterBar select,#filterBar input{font-size:11px;padding:3px 8px;border:1px solid #e2e8f0;border-radius:4px;color:#374151;background:#f8fafc}

/* Main content */
#mainContent{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── KANBAN ──────────────────────────────────────────────────────────── */
#kanbanView{flex:1;overflow-x:auto;display:flex;gap:0;padding:12px 16px;min-height:0}
.kb-col{background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;display:flex;flex-direction:column;min-width:240px;max-width:240px;margin-right:10px;flex-shrink:0}
.kb-col-header{padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:space-between}
.kb-col-header span.count{background:rgba(255,255,255,.3);border-radius:10px;padding:1px 7px;font-size:10px}
.col-design .kb-col-header{background:#7c3aed;color:#fff}
.col-purchase .kb-col-header{background:#0369a1;color:#fff}
.col-build .kb-col-header{background:#0f766e;color:#fff}
.col-done .kb-col-header{background:#15803d;color:#fff}
.col-post .kb-col-header{background:#0f172a;color:#fff}
.kb-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.kb-card{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:10px;cursor:pointer;transition:box-shadow .15s}
.kb-card:hover{box-shadow:0 2px 8px #0001;border-color:#bfdbfe}
.kb-card.stuck{border-left:3px solid #ef4444}
.kb-card .kc-cat{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:2px}
.kb-card .kc-name{font-size:12px;font-weight:600;color:#0f172a;line-height:1.3;margin-bottom:4px}
.kb-card .kc-sup{font-size:10px;color:#64748b}
.kb-card .kc-rel{font-size:10px;color:#7c3aed;margin-top:3px}
.kb-card .kc-due{font-size:10px;color:#ef4444;margin-top:2px}
.kb-card .kc-stage{font-size:9px;background:#eff6ff;color:#1d4ed8;padding:1px 6px;border-radius:8px;display:inline-block;margin-top:4px}
.kb-section-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;padding:4px 2px 2px;font-weight:700;border-top:1px solid #e2e8f0;margin-top:4px}
.kb-section-label:first-child{border-top:none;margin-top:0}

/* ── GANTT ──────────────────────────────────────────────────────────── */
#ganttView{flex:1;overflow:auto;display:none;padding:0}
#ganttWrap{min-width:900px}
.gantt-header{display:flex;background:#0f172a;color:#fff;font-size:10px;font-weight:700;position:sticky;top:0;z-index:10}
.gh-label{width:220px;flex-shrink:0;padding:8px 12px;border-right:1px solid #1e293b}
.gh-weeks{flex:1;display:flex}
.gh-week{flex:1;padding:6px 4px;text-align:center;border-right:1px solid #1e293b;font-size:9px}
.gh-week.today-week{background:#1e40af}
.gantt-row{display:flex;align-items:center;border-bottom:1px solid #f1f5f9;min-height:32px}
.gantt-row:hover{background:#f8fafc}
.gantt-row.section-row{background:#e2e8f0;min-height:24px}
.gr-label{width:220px;flex-shrink:0;padding:4px 12px;font-size:11px;color:#374151;border-right:1px solid #e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-row.section-row .gr-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#64748b;letter-spacing:.05em}
.gr-bars{flex:1;position:relative;height:32px}
.gantt-row.section-row .gr-bars{height:24px}
.gantt-bar{position:absolute;height:18px;top:7px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .15s}
.gantt-bar:hover{opacity:.85}
.gantt-bar.design{background:#7c3aed}
.gantt-bar.purchase{background:#0369a1}
.gantt-bar.build{background:#0f766e}
.gantt-bar.done{background:#15803d}
.gantt-bar.stuck{background:#dc2626}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:5;pointer-events:none}
.gantt-today::after{content:"TODAY";position:absolute;top:-16px;left:-18px;font-size:8px;color:#ef4444;font-weight:700;white-space:nowrap}
.rel-line{position:absolute;height:2px;background:#7c3aed;opacity:.4;top:50%;transform:translateY(-50%);pointer-events:none;z-index:4}

/* ── BUILD WEEK GRID ─────────────────────────────────────────────────── */
#buildView{flex:1;overflow:auto;display:none;padding:12px 16px}
#buildGrid{min-width:900px;background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden}
.bg-title{background:#0f172a;color:#fff;padding:10px 14px;font-size:13px;font-weight:700}
.bg-subtitle{background:#1e293b;color:#94a3b8;padding:4px 14px;font-size:10px}
table.bgt{width:100%;border-collapse:collapse;font-size:11px}
table.bgt th{background:#1e293b;color:#fff;padding:6px 8px;text-align:center;border:1px solid #334155;font-size:10px;white-space:nowrap}
table.bgt th.section-th{background:#0f172a;text-align:left;padding-left:12px}
table.bgt td{padding:5px 8px;border:1px solid #e2e8f0;vertical-align:top;min-width:80px}
table.bgt td.task-col{background:#f8fafc;font-weight:600;color:#374151;min-width:160px;white-space:nowrap}
table.bgt td.section-td{background:#e2e8f0;font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:.06em;color:#64748b;padding:4px 12px}
.bg-person{display:inline-block;border-radius:3px;padding:1px 5px;margin:1px;font-size:10px;font-weight:600;color:#fff;cursor:default}
.bg-tbd{color:#94a3b8;font-style:italic;font-size:10px}
table.bgt td.event-day{background:#eff6ff}
table.bgt td.setup-day{background:#fefce8}
table.bgt td.takedown-day{background:#f0fdf4}

/* ── DETAIL PANEL ────────────────────────────────────────────────────── */
#overlay{position:fixed;inset:0;background:#0003;z-index:499;display:none}
#overlay.open{display:block}
#detailPanel{position:fixed;right:0;top:0;bottom:0;width:380px;background:#fff;border-left:1px solid #e2e8f0;box-shadow:-4px 0 20px #0002;z-index:500;display:none;flex-direction:column}
#detailPanel.open{display:flex}
#dpHeader{padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:flex-start;background:#f8fafc}
#dpHeader h3{font-size:13px;font-weight:700;color:#0f172a;flex:1;margin-right:8px;line-height:1.4}
#dpClose{background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8}
#dpBody{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.dp-field label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;display:block;margin-bottom:3px}
.dp-field p{font-size:12px;color:#374151;line-height:1.5}
.dp-field select,.dp-field input[type=date],.dp-field textarea{width:100%;font-size:12px;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;color:#374151;font-family:inherit;background:#f8fafc}
.dp-field textarea{min-height:70px;resize:vertical}
.pipeline{display:flex;gap:0;flex-wrap:wrap;margin-top:4px}
.pipe-step{font-size:10px;padding:3px 10px;border:1px solid #e2e8f0;background:#f8fafc;color:#94a3b8;white-space:nowrap}
.pipe-step:first-child{border-radius:4px 0 0 4px}
.pipe-step:last-child{border-radius:0 4px 4px 0}
.pipe-step.completed{background:#dcfce7;color:#15803d;border-color:#86efac}
.pipe-step.current{background:#fef3c7;color:#92400e;border-color:#fcd34d;font-weight:700}
.pipe-arrow{font-size:10px;color:#cbd5e1;padding:0 2px;line-height:2.2}
.rel-tags{display:flex;flex-wrap:wrap;gap:4px}
.rel-tag{font-size:10px;background:#ede9fe;color:#7c3aed;padding:2px 8px;border-radius:10px;cursor:pointer}
.rel-tag:hover{background:#ddd6fe}
#dpSave{margin:12px 16px;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
#dpSave:hover{background:#2563eb}
#dpAdvance{margin:0 16px 4px;padding:8px;background:#0f766e;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
#dpAdvance:hover{background:#0d6b63}
#dpAdvance:disabled{background:#e2e8f0;color:#94a3b8;cursor:default}

#notify{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;display:none;z-index:999}

@media print {
  @page { size: A3 landscape; margin: 12mm; }
  #topbar, .view-tabs, #kanbanView, #timelineView, #print-hide { display: none !important; }
  body { background: #fff !important; font-size: 10px !important; }
  #buildView { display: block !important; overflow: visible !important; padding: 0 !important; }
  .bgt { font-size: 9px !important; }
  .bgt th, .bgt td { padding: 3px 5px !important; }
  .bg-person { font-size: 8px !important; padding: 1px 4px !important; }
  #print-header { display: block !important; }
  #print-footer { display: block !important; }
  #buildGrid { border: none !important; margin: 0 !important; }
  .section-td { font-size: 8px !important; }
}
#print-header { display: none; font-family: system-ui, sans-serif; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid #1e293b; }
#print-header h2 { font-size: 15px; font-weight: 700; color: #1e293b; }
#print-header .ph-meta { font-size: 10px; color: #64748b; margin-top: 3px; display: flex; gap: 20px; }
#print-footer { display: none; margin-top: 6px; border-top: 1px solid #e2e8f0; padding-top: 4px; font-family: system-ui, sans-serif; }
#print-footer .pf-meta { font-size: 9px; color: #94a3b8; display: flex; justify-content: space-between; }

</style>

function buildWeekDays(){
  const days = [];
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Find Monday of the week containing (EVENT_DATE - 7 days)
  // i.e. the Monday of the week BEFORE the event week
  const start = new Date(EVENT_DATE);
  start.setDate(start.getDate() - 7); // go back 7 days
  // Then find the Monday of THAT week (go forward if needed)
  while(start.getDay() !== 1) start.setDate(start.getDate() + 1);

  // Setup days: Mon to day before event
  const d = new Date(start);
  while(d < EVENT_DATE) {
    days.push({
      label: DAY_NAMES[d.getDay()] + ' ' + d.getDate() + ' ' + MON_NAMES[d.getMonth()],
      type: 'setup',
      date: new Date(d)
    });
    d.setDate(d.getDate() + 1);
  }

  // Event day
  days.push({
    label: DAY_NAMES[EVENT_DATE.getDay()] + ' ' + EVENT_DATE.getDate() + ' ' + MON_NAMES[EVENT_DATE.getMonth()] + ' ★',
    type: 'event',
    date: new Date(EVENT_DATE)
  });

  // Derig: 2 days after event
  const derig = new Date(EVENT_DATE);
  for(let i = 1; i <= 2; i++){
    derig.setDate(derig.getDate() + 1);
    days.push({
      label: DAY_NAMES[derig.getDay()] + ' ' + derig.getDate() + ' ' + MON_NAMES[derig.getMonth()],
      type: 'takedown',
      date: new Date(derig)
    });
  }

  return days;
}

window._loadTasks=async function(){
  try{
    const snap=await _db.collection('jobs').doc('fd7_kanban').get();
    if(snap.exists){
      const saved=snap.data().tasks;
      tasks=TASK_DEFS.map(d=>{
        const s=saved.find(t=>t.id===d.id);
        return s?{...d,currentStage:s.currentStage,status:s.status,dueDate:s.dueDate||'',taskNotes:s.taskNotes||''}:{...d};

  renderAll();
};

function getFiltered(){
  const cat=document.getElementById('filterCat').value;
  const search=document.getElementById('filterSearch').value.toLowerCase();
  return tasks.filter(t=>{
    if(cat&&t.cat!==cat)return false;
    if(search&&!t.task.toLowerCase().includes(search)&&!t.supplier.toLowerCase().includes(search))return false;
    return true;
  });
}

// ── KANBAN ─────────────────────────────────────────────────────────────────
function renderKanban(){
  const filtered=getFiltered();
  const cols={D:[],P:[],B:[],X:[],PE:[]};
  filtered.forEach(t=>{
    const stage=t.status==='Done'?'X':t.stages[t.currentStage]||'X';
    if(cols[stage])cols[stage].push(t);
  });

  const colDefs=[
    {key:'D',label:'Design',cls:'col-design'},
    {key:'P',label:'Purchase / Book',cls:'col-purchase'},
    {key:'B',label:'Print / Build',cls:'col-build'},
    {key:'X',label:'Done',cls:'col-done'},
    {key:'PE',label:'Post-Event ↺',cls:'col-post'},
  ];

  const kb=document.getElementById('kanbanView');
  kb.innerHTML='';
  colDefs.forEach(cd=>{
    const tasks=cols[cd.key];
    const col=document.createElement('div');
    col.className='kb-col '+cd.cls;
    
    // Group by category
    const byCat={};
    tasks.forEach(t=>{if(!byCat[t.cat])byCat[t.cat]=[];byCat[t.cat].push(t);});

    let cardsHtml='';
    Object.entries(byCat).forEach(([cat,catTasks])=>{
      cardsHtml+=`<div class="kb-section-label">${cat}</div>`;
      catTasks.forEach(t=>{
        const relCount=t.related.length;
        const stageLabel=STAGE_LABELS[t.stages[t.currentStage]]||'Done';
        cardsHtml+=`
          <div class="kb-card${t.status==='Stuck'?' stuck':''}" onclick="openDetail(${t.id})">
            <div class="kc-name">${t.task}</div>
            ${t.supplier?`<div class="kc-sup">📦 ${t.supplier.length>40?t.supplier.substring(0,40)+'...':t.supplier}</div>`:''}
            ${relCount?`<div class="kc-rel">🔗 ${relCount} related task${relCount>1?'s':''}</div>`:''}
            ${t.dueDate?`<div class="kc-due">📅 ${fmtDate(t.dueDate)}</div>`:''}
            <div class="kc-stage">${stageLabel}</div>
          </div>`;
      });
    });

    col.innerHTML=`
      <div class="kb-col-header">${cd.label}<span class="count">${tasks.length}</span></div>
      <div class="kb-cards">${cardsHtml}</div>`;
    kb.appendChild(col);
  });
}

// ── GANTT ──────────────────────────────────────────────────────────────────
function renderGantt(){
  const filtered=getFiltered();
  const totalDays=(T_END-T_START)/(1000*60*60*24);
  const todayPct=((T_TODAY-T_START)/(T_END-T_START))*100;

  // Build week labels
  const weeks=[];
  const d=new Date(T_START);
  while(d<=T_END){
    weeks.push(new Date(d));
    d.setDate(d.getDate()+7);
  }

  const weeksHtml=weeks.map(w=>{
    const isNow=Math.abs(w-T_TODAY)<7*24*60*60*1000;
    return `<div class="gh-week${isNow?' today-week':''}">
      ${w.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>`;
  }).join('');

  // Group by category
  const byCat={};
  filtered.forEach(t=>{if(!byCat[t.cat])byCat[t.cat]=[];byCat[t.cat].push(t);});

  let rowsHtml='';
  Object.entries(byCat).forEach(([cat,catTasks])=>{
    rowsHtml+=`<div class="gantt-row section-row"><div class="gr-label">${cat}</div><div class="gr-bars"></div></div>`;
    catTasks.forEach(t=>{
      const barColor=t.status==='Stuck'?'#dc2626':STAGE_COLORS[t.stages[t.currentStage]]||'#15803d';
      const barClass=t.status==='Done'?'done':t.status==='Stuck'?'stuck':(t.stages[t.currentStage]||'X').toLowerCase();
      
      // Bar position: if no due date, show as a 2-week task starting today
      let start=T_TODAY, end=new Date(T_TODAY);
      end.setDate(end.getDate()+14);
      if(t.dueDate){
        end=new Date(t.dueDate);
        start=new Date(T_TODAY);
        if(end<start)start=end;
      }
      const left=Math.max(0,((start-T_START)/(T_END-T_START))*100);
      const width=Math.max(1,((end-start)/(T_END-T_START))*100);

      // Relationship lines to related tasks (simple: shown as dot)
      rowsHtml+=`
        <div class="gantt-row" onclick="openDetail(${t.id})">
          <div class="gr-label" title="${t.task}">${t.task}</div>
          <div class="gr-bars">
            <div class="gantt-today" style="left:${todayPct}%"></div>
            <div class="gantt-bar ${barClass}" style="left:${left}%;width:${width}%;background:${barColor}" title="${t.task}">
              ${t.task}
            </div>
          </div>
        </div>`;
    });
  });

  const gantt=document.getElementById('ganttView');
  gantt.innerHTML=`
    <div id="ganttWrap">
      <div class="gantt-header">
        <div class="gh-label">Task</div>
        <div class="gh-weeks">${weeksHtml}</div>
      </div>
      ${rowsHtml}
    </div>`;
}

  // ── Build week drag & drop ──────────────────────────────────────────────────
  var _dragSrcKey = null;
  var _dragSrcVal = null;

  function onChipDragStart(e, key, val) {
    _dragSrcKey = key;
    _dragSrcVal = val;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', val);
    setTimeout(function(){ e.target.style.opacity='0.4'; }, 0);
  }

  function onChipDragEnd(e) {
    e.target.style.opacity = '1';
  }

  function onCellDragOver(e) {
    e.preventDefault();
    e.currentTarget.style.outline = '2px dashed #3b82f6';
    e.currentTarget.style.background = '#eff6ff';
  }

  function onCellDragLeave(e) {
    e.currentTarget.style.outline = '';
    e.currentTarget.style.background = '';
  }

  function onCellDrop(e, targetKey) {
    e.preventDefault();
    e.currentTarget.style.outline = '';
    e.currentTarget.style.background = '';
    if (!_dragSrcKey || _dragSrcKey === targetKey) { _dragSrcKey=null; return; }
    cells[targetKey] = _dragSrcVal;
    cells[_dragSrcKey] = '';
    _dragSrcKey = null;
    _dragSrcVal = null;

function renderBuildGrid(){
  const bw=BUILD_WEEK;
  const dayTypes=bw.days.map(d=>d.type);
  const dayLabels=bw.days.map(d=>d.label);

  const personColors={
    'LN':'#1d4ed8','RC':'#7c3aed','Site team':'#0f766e','':'#92400e',
    'Luxury Toilet Hire':'#be185d','House Group':'#0369a1','Under The Canvas':'#0891b2',
    'Ronnie':'#7c3aed','Panache Audio':'#15803d','Kacy Sounds':'#15803d',
    'StageACE':'#374151','Marvellous Glow':'#d97706','Marvellous Glow':'#d97706',
    'Swifty Security Security':'#dc2626','RDL':'#0891b2','RDL':'#0891b2',
    'Dunmow Group':'#374151','Local Toilet Hire':'#374151','WTS':'#0369a1',
    'Internet (Lloydy)':'#0f766e','Fleur De Lys':'#be185d','Fleur De Lys':'#be185d',
    'Be Entertained':'#d97706','Photographer':'#7c3aed','Bar Team':'#15803d',
  };

  function colorPerson(text, isDerig){
    if(!text||!text.trim())return '';
    const parts=text.split('/').map(p=>p.trim()).filter(Boolean);
    return parts.map(p=>{
      const key=Object.keys(personColors).find(k=>p.toLowerCase().includes(k.toLowerCase()));
      const color=key?personColors[key]:'#475569';
      if(isDerig){
        // Convert hex to pastel by mixing with white
        const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
        const pr=Math.round(r+(255-r)*0.55),pg=Math.round(g+(255-g)*0.55),pb=Math.round(b+(255-b)*0.55);
        const pastel='#'+[pr,pg,pb].map(v=>v.toString(16).padStart(2,'0')).join('');
        return `<span class="bg-person" style="background:${pastel};color:${color};border:1px solid ${color}40">${p}</span>`;
      }
      return `<span class="bg-person" style="background:${color}">${p}</span>`;
    }).join('');
  }

  // Use global cells (loaded by loadBuildCells)
  if(!window._buildCells) window._buildCells = {};
  cells = window._buildCells;

  function cellKey(secName, taskName, dayIdx){
    return secName.replace(/\s/g,'_') + '__' + taskName.replace(/\s/g,'_') + '__' + dayIdx;
  }

  function makeCell(secName, taskName, dayIdx, defaultText, dayType){
    const key = cellKey(secName, taskName, dayIdx);
    const saved = cells[key];
    const display = saved !== undefined ? saved : defaultText;
    const isDerig = dayType === 'takedown';
    const colorHtml = colorPerson(display, isDerig);
    const safeKey = key.replace(/'/g,"\'");
    const safeDefault = (defaultText||'').replace(/'/g,"\'");
    const safeDisplay = (display||'').replace(/'/g,"\'");
    const chipInner = colorHtml
      ? colorHtml.replace(/class="bg-person/g, 'draggable="true" ondragstart="onChipDragStart(event,\'' + safeKey + '\',\'' + safeDisplay + '\')" ondragend="onChipDragEnd(event)" class="bg-person')
      : (display ? '<span draggable="true" ondragstart="onChipDragStart(event,\'' + safeKey + '\',\'' + safeDisplay + '\')" ondragend="onChipDragEnd(event)" style="font-size:11px;color:#555;cursor:grab">' + display + '</span>' : '<span style="color:#ddd;font-size:10px">+ add</span>');
    return `<td class="${dayType}-day" style="cursor:pointer;min-width:90px;position:relative"
      onclick="editBuildCell(this,'${safeKey}','${safeDefault}')"
      ondragover="onCellDragOver(event)"
      ondragleave="onCellDragLeave(event)"
      ondrop="onCellDrop(event,'${safeKey}')"
      title="Click to edit · Drag to move">
      <div id="bcell_${key}" style="min-height:24px">${chipInner}</div>
    </td>`;
  }

  // ── Render grid ──────────────────────────────────────────────────────────────
  var html = '<div class="bg-title">'+bw.title+'</div>';
  if(bw.subtitle) html += '<div class="bg-subt">'+bw.subtitle+'</div>';
  html += '<div style="overflow-x:auto"><table class="bgt"><thead><tr>';
  html += '<th style="min-width:140px">Task</th>';
  bw.days.forEach(function(d){
    html += '<th class="'+d.type+'-day" style="min-width:90px;text-align:center;font-size:10px">'+d.label+'</th>';
  });
  html += '</tr></thead><tbody>';
  bw.sections.forEach(function(sec){
    html += '<tr><td class="section-td" colspan="'+(bw.days.length+1)+'">'+sec.name+'</td></tr>';
    sec.tasks.forEach(function(task){
      var tname = task.task || task.name || '';
      html += '<tr><td style="font-size:11px;color:#374151;min-width:160px;white-space:nowrap">'+tname+'</td>';
      bw.days.forEach(function(d,i){
        var defVal = (task.days && task.days[i] !== undefined) ? task.days[i] : (task.default||'');
        html += makeCell(sec.name, tname, i, defVal, d.type);
      });
      html += '</tr>';
    });
  });
  html += '</tbody></table></div>';
  document.getElementById('buildGrid').innerHTML = html;
}

var _detailTaskId = null;

function openDetail(id) {
  var t = tasks.find(function(t2){ return t2.id === id; });
  if (!t) return;
  _detailTaskId = id;

  document.getElementById('dt-title').textContent = t.task;
  document.getElementById('dt-status').value = t.status || 'Not Started';

  var stageLabel = STAGE_LABELS[t.stages ? t.stages[t.currentStage||0] : 'P'] || 'Purchase / Book';
  var html = '';
  if (t.cat) html += '<div style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px">' + t.cat + '</div>';
  if (t.supplier) html += '<div style="font-size:12px;margin-bottom:8px;color:#374151">📦 ' + t.supplier + '</div>';
  if (t.notes) html += '<div style="font-size:12px;color:#475569;background:#f8fafc;border-radius:6px;padding:8px 10px;margin-bottom:8px">' + t.notes + '</div>';
  if (t.dueDate) html += '<div style="font-size:11px;color:#854d0e;background:#fef9c3;padding:4px 8px;border-radius:4px;display:inline-block;margin-bottom:8px">📅 Due: ' + t.dueDate + '</div>';

  // Current stage
  html += '<div style="font-size:11px;color:#64748b;margin-bottom:6px">Current stage: <strong style="color:#1e293b">' + stageLabel + '</strong></div>';

  // Stage progress
  if (t.stages && t.stages.length) {
    html += '<div style="display:flex;gap:4px;margin-bottom:10px">';
    t.stages.forEach(function(s, i) {
      var active = i === (t.currentStage||0);
      var done = i < (t.currentStage||0);
      var col = done ? '#15803d' : active ? (STAGE_COLORS[s]||'#64748b') : '#e2e8f0';
      html += '<div style="flex:1;height:6px;border-radius:3px;background:' + col + '" title="' + (STAGE_LABELS[s]||s) + '"></div>';
    });
    html += '</div>';
  }

  // Task notes input
  html += '<div style="margin-top:8px"><label style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;display:block;margin-bottom:4px">Notes</label>';
  html += '<textarea id="dt-notes" style="width:100%;min-height:70px;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;outline:none;resize:vertical">' + (t.taskNotes||'') + '</textarea></div>';

  document.getElementById('dt-body').innerHTML = html;

  // Stage advance buttons
  var stageBtns = document.getElementById('dt-stage-btns');
  stageBtns.innerHTML = '';
  if (t.stages && (t.currentStage||0) < t.stages.length - 1) {
    var nextStage = STAGE_LABELS[t.stages[(t.currentStage||0)+1]] || 'Next';
    var btn = document.createElement('button');
    btn.textContent = 'Advance to ' + nextStage + ' →';
    btn.style.cssText = 'padding:7px 14px;background:#22224C;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer';
    btn.onclick = function(){ advanceStage(); };
    stageBtns.appendChild(btn);
  }

  document.getElementById('detailModal').style.display = 'flex';
}

function closeDetail() {
  // Save notes
  if (_detailTaskId !== null) {
    var t = tasks.find(function(t2){ return t2.id === _detailTaskId; });
    var notesEl = document.getElementById('dt-notes');
    if (t && notesEl) { t.taskNotes = notesEl.value; fbSave(); }
  }
  document.getElementById('detailModal').style.display = 'none';
  renderAll();
}

function updateTaskStatus() {
  if (_detailTaskId === null) return;
  var t = tasks.find(function(t2){ return t2.id === _detailTaskId; });
  if (!t) return;
  t.status = document.getElementById('dt-status').value;
  if (t.status === 'Done') t.currentStage = (t.stages||[]).length - 1;
  fbSave();
  renderAll();
}

function advanceStage() {
  if (_detailTaskId === null) return;
  var t = tasks.find(function(t2){ return t2.id === _detailTaskId; });
  if (!t || !t.stages) return;
  if ((t.currentStage||0) < t.stages.length - 1) {
    t.currentStage = (t.currentStage||0) + 1;
    if (t.currentStage === t.stages.length - 1) t.status = 'Done';
  }
  fbSave();
  openDetail(_detailTaskId);
  renderAll();
}

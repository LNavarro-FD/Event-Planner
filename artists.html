*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f1f5f9;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#22224C;height:44px;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
#topbar h1{color:#fff;font-size:14px;font-weight:700;margin-right:4px}
.view-btn{padding:4px 12px;border-radius:20px;border:1px solid #475569;background:transparent;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer}
.view-btn.active{background:#FF4B7B;border-color:#FF4B7B;color:#fff}
#toolbar{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;align-items:center;flex-wrap:wrap}
#toolbar select{padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;outline:none}
.btn{padding:6px 14px;background:#FF4B7B;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.btn:hover{background:#e0436a}
.btn-sm{padding:4px 10px;font-size:11px;border:none;border-radius:5px;cursor:pointer;font-weight:600}
#content{flex:1;overflow-y:auto;padding:16px}
#statusbar{background:#0f172a;height:22px;display:flex;align-items:center;padding:0 12px;flex-shrink:0}
#statusbar span{font-size:10px;color:#334155}

/* Artist cards */
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.a-card{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:14px;transition:box-shadow .15s}
.a-card:hover{box-shadow:0 2px 8px #0001}
.a-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.a-name{font-weight:700;font-size:15px;color:#22224C}
.a-legal{font-size:11px;color:#64748b}
.a-set{font-size:12px;color:#FF4B7B;font-weight:600;margin-bottom:6px}
.a-contact{font-size:11px;color:#475569;margin-bottom:8px}
.a-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-aaa{background:#fce7f3;color:#9d174d}
.badge-info{background:#f1f5f9;color:#475569}
.badge-green{background:#dcfce7;color:#15803d}
.badge-amber{background:#fef9c3;color:#854d0e}
.badge-red{background:#fee2e2;color:#dc2626}
.a-actions{display:flex;gap:6px;flex-wrap:wrap}

/* Runsheet view */
.run-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0}
.run-table th{background:#22224C;color:#fff;padding:8px 12px;text-align:left;font-size:11px;font-weight:600}
.run-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:12px}
.run-table tr:hover td{background:#fafafa}
.set-time{font-weight:700;color:#FF4B7B;font-family:monospace}

/* Guest list view */
.guest-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0}
.guest-table th{background:#f8fafc;padding:7px 12px;text-align:left;font-size:11px;font-weight:600;color:#64748b;border-bottom:1px solid #e2e8f0}
.guest-table td{padding:7px 12px;border-bottom:1px solid #f1f5f9;font-size:12px}
.access-aaa{background:#fce7f3;color:#9d174d;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.access-gr{background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.access-foh{background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}

/* Modal */
.overlay{position:fixed;inset:0;background:#0005;z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:560px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px #0003}
.modal-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-header h3{font-size:15px;font-weight:700;color:#22224C}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#FF4B7B}
.field textarea{min-height:60px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#FF4B7B;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #fce7f3}
.guest-row{display:grid;grid-template-columns:1fr 120px 28px;gap:6px;align-items:center;margin-bottom:6px}
.guest-row input,.guest-row select{padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;font-family:inherit;outline:none;width:100%}
.del-btn{background:none;border:none;cursor:pointer;color:#e2e8f0;font-size:16px}
.del-btn:hover{color:#ef4444}

/* Email preview */
.email-preview{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:14px;font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:monospace;max-height:400px;overflow-y:auto}

@media print {
  @page{size:A4 portrait;margin:14mm}
  #topbar,#toolbar,#statusbar,.a-actions,button{display:none!important}
  body{background:#fff!important;height:auto!important;overflow:visible!important}
  #content{overflow:visible!important;height:auto!important}
}

// ── Firebase ──────────────────────────────────────────────────────────────────
async function load() {
  try {
    var snap = await _db.collection('artists_db').doc('artists').get();
    if (snap.exists && snap.data().list && snap.data().list.length) {
      var loaded = snap.data().list;
      // Check if loaded data has FD7 artists — if not, fall back to seed
      var hasFD7 = loaded.some(function(a){ return a.events && a.events.includes('FD7'); });
      if (hasFD7) {
        artists = loaded;
      } else {
        artists = SEED_ARTISTS;
        await _db.collection('artists_db').doc('artists').set({list: artists});
      }
    } else {
      artists = SEED_ARTISTS;
      await _db.collection('artists_db').doc('artists').set({list: artists});
    }
  } catch(e) {
    console.warn('Load failed', e);
    artists = SEED_ARTISTS;
  }
  render();
}

function resetToSeed() {
  if (!confirm('Update artist data to latest set times and lineup? This will overwrite any manual changes.')) return;
  // Update in-memory immediately
  artists = JSON.parse(JSON.stringify(SEED_ARTISTS));
  // Save to Firestore
  _db.collection('artists_db').doc('artists').set({list: artists})
    .then(function(){ notify('Updated — ' + artists.length + ' artists loaded with latest set times'); })
    .catch(function(e){ console.warn('Firestore save failed, showing local data:', e); });

// ── Views ─────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(function(b, i) {
    b.classList.toggle('active', ['artists','runsheet','guestlist'][i] === v);
  });
  render();
}

function render() {
  var evt = document.getElementById('eventFilter').value;
  var filtered = artists.filter(function(a){ return a.events && a.events.includes(evt); });
  filtered.sort(function(a,b){ return (a.setTime||'').localeCompare(b.setTime||''); });
  document.getElementById('countLabel').textContent = filtered.length + ' artists';

  if (currentView === 'artists') renderArtists(filtered);
  else if (currentView === 'runsheet') renderRunsheet(filtered);
  else renderGuestList(filtered, evt);
}

function ragStatus(a) {
  if (a.infoStatus === 'confirmed') return 'green';
  if (a.infoStatus === 'received') return 'amber';
  return 'red';
}

function ragLabel(a) {
  if (a.infoStatus === 'confirmed') return '✓ Confirmed';
  if (a.infoStatus === 'received') return 'Info received';
  return 'Awaiting info';
}

function fmtTime(t) {
  if (!t) return '—';
  return t;
}

function fmtEndTime(setTime, setLength) {
  if (!setTime || !setLength) return '';
  var parts = setTime.split(':').map(Number);
  var mins = parts[0]*60 + parts[1] + parseInt(setLength||0);
  return String(Math.floor(mins/60)%24).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0');
}

function renderArtists(filtered) {
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<p style="padding:20px;color:#94a3b8">No artists for this event.</p>';
    return;
  }
  var html = '<div class="artist-grid">';
  filtered.forEach(function(a) {
    var rag = ragStatus(a);
    var endTime = fmtEndTime(a.setTime, a.setLength);
    var guestCount = (a.guests||[]).length;
    html += '<div class="a-card">';
    html += '<div class="a-top"><div>';
    html += '<div class="a-name">'+a.perfName+'</div>';
    if (a.legalName && a.legalName !== a.perfName) html += '<div class="a-legal">'+a.legalName+'</div>';
    html += '</div>';
    html += '<span class="badge badge-'+rag+'">'+ragLabel(a)+'</span>';
    html += '</div>';
    if (a.setTime) html += '<div class="a-set">'+fmtTime(a.setTime)+(endTime?' – '+endTime:'')+(a.setLength?' ('+a.setLength+'min)':'')+'</div>';
    html += '<div class="a-contact">';
    if (a.email) html += '<a href="mailto:'+a.email+'" style="color:#FF4B7B;text-decoration:none">'+a.email+'</a><br>';
    if (a.phone) html += '📞 '+a.phone;
    if (a.agentName) html += '<br>Agent: '+a.agentName+(a.agentPhone?' · '+a.agentPhone:'');
    html += '</div>';
    html += '<div class="a-badges">';
    html += '<span class="badge badge-aaa">AAA Lanyard + Wristband</span>';
    html += '<span class="badge badge-info">2 AAA guest wristbands</span>';
    if (guestCount > 0) html += '<span class="badge badge-info">'+guestCount+' guest'+(guestCount>1?'s':'')+'</span>';
    if (a.hotel === 'yes') html += '<span class="badge badge-info">Hotel needed</span>';
    if (a.packSent === 'yes') html += '<span class="badge badge-green">Pack sent</span>';
    if (a.notes) html += '<span class="badge badge-amber" title="'+a.notes+'">Note</span>';
    html += '</div>';
    html += '<div class="a-actions">';
    html += '<button class="btn-sm edit-btn" data-id="'+a.id+'" style="background:#f1f5f9;color:#475569">Edit</button>';
    html += '<button class="btn-sm email-btn" data-id="'+a.id+'" style="background:#fce7f3;color:#9d174d">📧 Send info</button>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;

  document.querySelectorAll('.edit-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ openEditArtist(this.getAttribute('data-id')); });
  });
  document.querySelectorAll('.email-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ openEmailModal(this.getAttribute('data-id')); });
  });
}

function renderRunsheet(filtered) {
  var html = '<table class="run-table"><thead><tr><th>Time</th><th>Artist</th><th>Set length</th><th>Changeover</th><th>Hotel</th><th>Status</th></tr></thead><tbody>';
  filtered.forEach(function(a) {
    var endTime = fmtEndTime(a.setTime, a.setLength);
    var rag = ragStatus(a);
    html += '<tr>';
    html += '<td class="set-time">'+fmtTime(a.setTime)+(endTime?' – '+endTime:'')+'</td>';
    html += '<td style="font-weight:600">'+a.perfName+'</td>';
    html += '<td>'+(a.setLength||'—')+'min</td>';
    html += '<td>'+(a.changeover||'—')+'min</td>';
    html += '<td>'+(a.hotel==='yes'?'✓':'—')+'</td>';
    html += '<td><span class="badge badge-'+rag+'">'+ragLabel(a)+'</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('content').innerHTML = html;
}

function renderGuestList(filtered, evt) {
  var html = '<div style="margin-bottom:8px;font-size:11px;color:#64748b">🔵 AAA — stage + green room + everywhere &nbsp;·&nbsp; 🟢 Green room — green room only, not stage &nbsp;·&nbsp; ⚪ FOH — front of house only</div>';
  html += '<table class="guest-table"><thead><tr><th>Artist</th><th>Guest name</th><th>Access</th><th>Notes</th></tr></thead><tbody>';

  // First add artists themselves
  filtered.forEach(function(a) {
    html += '<tr style="background:#fafafa">';
    html += '<td style="font-weight:700;color:#22224C">'+a.perfName+'</td>';
    html += '<td style="font-weight:600">'+a.perfName+' (artist)</td>';
    html += '<td><span class="access-aaa">AAA</span></td>';
    html += '<td style="color:#64748b;font-size:11px">'+fmtTime(a.setTime)+(a.setLength?' · '+a.setLength+'min':'')+'</td>';
    html += '</tr>';

    (a.guests||[]).forEach(function(g) {
      html += '<tr>';
      html += '<td style="color:#64748b;font-size:11px">'+a.perfName+'</td>';
      html += '<td>'+g.name+'</td>';
      html += '<td><span class="access-gr">Green room</span></td>';
      html += '<td style="color:#64748b;font-size:11px">'+(g.notes||'')+'</td>';
      html += '</tr>';
    });
  });

  html += '</tbody></table>';

  // Export to Tapgate note
  var totalGuests = filtered.reduce(function(n,a){ return n+(a.guests||[]).length; },0);
  html += '<div style="margin-top:12px;padding:10px 14px;background:#fce7f3;border-radius:6px;font-size:11px;color:#9d174d">';
  html += '🎧 '+filtered.length+' artists · '+totalGuests+' guests · All guest list data feeds into Tapgate for door scanning';
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function buildGuestRow(name, notes) {
  return '<div class="guest-row">'+
    '<input type="text" value="'+(name||'')+'" placeholder="Guest full name">'+
    '<input type="text" value="'+(notes||'')+'" placeholder="Notes">'+
    '<button class="del-btn" onclick="this.closest(\'.guest-row\').remove()">×</button>'+
    '</div>';
}

function addGuestRow() {
  var gr = document.getElementById('guest-rows');

function saveArtist() {
  var perfName = document.getElementById('a-perfname').value.trim();
  if (!perfName) { alert('Performance name required'); return; }
  var id = editingId || perfName.toLowerCase().replace(/[^a-z0-9]+/g,'_');

  var events = [];
  document.querySelectorAll('#a-events input:checked').forEach(function(cb){ events.push(cb.value); });

  var guests = [];
  document.querySelectorAll('.guest-row').forEach(function(row){
    var inputs = row.querySelectorAll('input');
    var name = inputs[0] ? inputs[0].value.trim() : '';
    var notes = inputs[1] ? inputs[1].value.trim() : '';
    if (name) guests.push({name:name, notes:notes, access:'greenroom'});
  });

  var a = {
    id:id, perfName:perfName,
    legalName:   document.getElementById('a-legalname').value.trim(),
    email:       document.getElementById('a-email').value.trim(),
    phone:       document.getElementById('a-phone').value.trim(),
    emName:      document.getElementById('a-emname').value.trim(),
    emPhone:     document.getElementById('a-emphone').value.trim(),
    agentName:   document.getElementById('a-agentname').value.trim(),
    agentEmail:  document.getElementById('a-agentemail').value.trim(),
    agentPhone:  document.getElementById('a-agentphone').value.trim(),
    events:      events,
    fee:         parseFloat(document.getElementById('a-fee').value)||0,
    setTime:     document.getElementById('a-settime').value,
    setLength:   parseInt(document.getElementById('a-setlength').value)||60,
    changeover:  parseInt(document.getElementById('a-changeover').value)||15,
    hotel:       document.getElementById('a-hotel').value,
    hotelDetails:document.getElementById('a-hoteldetails').value.trim(),
    techRider:   document.getElementById('a-techrider').value.trim(),
    hospRider:   document.getElementById('a-hosprider').value.trim(),
    notes:       document.getElementById('a-notes').value.trim(),
    infoStatus:  document.getElementById('a-infostatus').value,
    packSent:    document.getElementById('a-packsent').value,
    guests:      guests,
  };

  var idx = artists.findIndex(function(x){ return x.id===id; });
  if (idx>=0) artists[idx]=a; else artists.push(a);
  save();
  closeModal();
  render();
}

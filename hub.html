<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Event Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,sans-serif;background:#0f172a;overflow:hidden}
#shell{display:flex;flex-direction:column;height:100vh}
#nav{background:#1e293b;height:48px;display:flex;align-items:center;flex-shrink:0;border-bottom:1px solid #334155}
#nav-logo{padding:0 16px;font-size:13px;font-weight:800;color:#fff;white-space:nowrap;border-right:1px solid #334155}
#nav-logo span{color:#3b82f6}
#nav-tabs{display:flex;flex:1;overflow-x:auto;height:100%;scrollbar-width:none}
#nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{height:100%;padding:0 16px;display:flex;align-items:center;font-size:12px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase;user-select:none}
.nav-tab.active{color:#fff;border-bottom-color:#3b82f6}
#content{flex:1;position:relative;overflow:hidden}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f1f5f9;flex-direction:column;gap:12px;z-index:10;pointer-events:none}
#loading.hidden{display:none}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#statusbar{background:#0f172a;height:22px;display:flex;align-items:center;padding:0 12px;flex-shrink:0}
#sb{font-size:10px;color:#334155}
</style>

<script>
function saveApiKey() {
  var key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert('Please enter an API key'); return; }
  localStorage.setItem('fd_anthropic_key', key);
  document.getElementById('apiKeyBanner').style.display = 'none';
  alert('API key saved. AI features are now active.');
}

// Show banner if no key set
window.addEventListener('load', function() {
  if (!localStorage.getItem('fd_anthropic_key')) {
    document.getElementById('apiKeyBanner').style.display = 'flex';
  } else {
    document.getElementById('apiKeyBanner').style.display = 'none';
  }
});

// Global function for all modules to get the key
window.getAnthropicKey = function() {
  return localStorage.getItem('fd_anthropic_key') || '';
};
</script>

</head>
<body>
<div id="shell">
  <div id="nav">
    <div id="nav-logo">FD<span>.</span>PLAN</div>
    <div id="nav-tabs">
      <div class="nav-tab active" onclick="go('home')" data-tab="home">Home</div>
      <div class="nav-tab" onclick="go('planner')" data-tab="planner">Site Planner</div>
      <div class="nav-tab"        onclick="go('todo')"    data-tab="todo">To-Do</div>
      <div class="nav-tab"        onclick="go('kanban')"  data-tab="kanban">Kanban</div>
      <div class="nav-tab"        onclick="go('artists')" data-tab="artists">Artists</div>
      <div class="nav-tab"        onclick="go('staff')"   data-tab="staff">Staff</div>
      <div class="nav-tab"        onclick="go('suppliers')" data-tab="suppliers">Suppliers</div>
      <div class="nav-tab"        onclick="go('print')"   data-tab="print">Design & Print</div>
    </div>
  </div>
  <div id="content">
    <div id="loading"><div class="spinner"></div><p>Loading...</p></div>
    <iframe id="f" src="todo.html" onload="loaded()"></iframe>
  </div>
  <div id="statusbar"><span id="sb">FD Event Planner · hub v1.4.0</span></div>
</div>
<script>
var SRCS = {home:'home.html', artists:'artists.html', todo:'todo.html', planner:'venue-planner.html', kanban:'kanban.html', staff:'staff.html', suppliers:'suppliers.html', print:'print.html'};
var cur = 'home';

function loaded() {
  document.getElementById('loading').classList.add('hidden');
}

function go(tab) {
  if (tab === cur) return;
  cur = tab;

  // Update nav
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
  }

  // Show loading, swap src
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('f').src = SRCS[tab];
}
</script>
</body>
</html>

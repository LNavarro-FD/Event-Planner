<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Event Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,sans-serif;background:#0f172a;overflow:hidden}
#loginOverlay{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#loginBox{background:#1e293b;border-radius:12px;padding:40px 44px;display:flex;flex-direction:column;gap:14px;min-width:300px;max-width:90vw;box-shadow:0 8px 40px #0008}
#loginBox h2{color:#fff;font-size:20px;font-weight:700;text-align:center}
#loginBox p{color:#64748b;font-size:12px;text-align:center;margin-top:-8px}
#loginBox input[type=email],#loginBox input[type=password]{padding:10px 14px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff;font-size:14px;outline:none;width:100%}
#loginBox input:focus{border-color:#3b82f6}
.signin-btn{padding:11px;border-radius:8px;background:#3b82f6;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;width:100%}
#loginErr{color:#ef4444;font-size:12px;text-align:center;min-height:16px}
.remember-row{display:flex;align-items:center;gap:8px}
.remember-row label{font-size:12px;color:#94a3b8;cursor:pointer}
.forgotlink{text-align:center;font-size:12px;color:#64748b;cursor:pointer;text-decoration:underline}
#loginVersion{font-size:10px;color:#334155;text-align:center}
#shell{display:none;flex-direction:column;height:100vh}
#nav{background:#1e293b;height:48px;display:flex;align-items:center;flex-shrink:0;border-bottom:1px solid #334155}
#nav-logo{padding:0 16px;font-size:13px;font-weight:800;color:#fff;white-space:nowrap;border-right:1px solid #334155}
#nav-logo span{color:#3b82f6}
#nav-tabs{display:flex;flex:1;overflow-x:auto;height:100%;scrollbar-width:none}
#nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{height:100%;padding:0 16px;display:flex;align-items:center;font-size:12px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase;user-select:none}
.nav-tab.active{color:#fff;border-bottom-color:#3b82f6}
#nav-right{display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;border-left:1px solid #334155}
#nav-user{font-size:11px;color:#64748b;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-btn{font-size:11px;padding:4px 10px;border:1px solid #334155;border-radius:6px;background:transparent;color:#94a3b8;cursor:pointer}
#content{flex:1;position:relative;overflow:hidden}
.frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f1f5f9;flex-direction:column;gap:12px;z-index:10}
#loading.hidden{display:none}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#statusbar{background:#0f172a;height:22px;display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0}
#sb-auth{font-size:10px;color:#64748b}
</style>

<!-- Firebase v8 — widest browser compatibility, no modules needed -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-auth.min.js"></script>

<script>
firebase.initializeApp({
  apiKey:            'AIzaSyCt-MVurfEOcvj_4Q9ndD6dqJrf8hfm4x8',
  authDomain:        'event-planner-7944d.firebaseapp.com',
  projectId:         'event-planner-7944d',
  storageBucket:     'event-planner-7944d.firebasestorage.app',
  messagingSenderId: '455768566205',
  appId:             '1:455768566205:web:c5274d85158e6b2bf8cad4'
});

var auth = firebase.auth();

// Default to local persistence — stay logged in
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('shell').style.display       = 'flex';
    document.getElementById('nav-user').textContent      = user.email;
    document.getElementById('sb-auth').textContent       = '● ' + user.email;
    document.getElementById('sb-auth').style.color       = '#10b981';
    window._currentUser = user;
    if (!window._activeTab) switchTab('todo');
  } else {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('shell').style.display        = 'none';
    window._currentUser = null;
  }
});

function doLogin() {
  var email   = document.getElementById('loginEmail').value.trim();
  var pwd     = document.getElementById('loginPwd').value;
  var err     = document.getElementById('loginErr');
  var btn     = document.getElementById('signinBtn');
  var remember = document.getElementById('rememberMe').checked;

  err.style.color = '#64748b';
  err.textContent = 'Signing in...';
  btn.disabled    = true;

  var persistence = remember
    ? firebase.auth.Auth.Persistence.LOCAL
    : firebase.auth.Auth.Persistence.SESSION;

  auth.setPersistence(persistence)
    .then(function() {
      return auth.signInWithEmailAndPassword(email, pwd);
    })
    .then(function() {
      err.textContent = '';
    })
    .catch(function(e) {
      err.style.color = '#ef4444';
      err.textContent =
        e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'
          ? 'Incorrect email or password.'
          : e.code === 'auth/user-not-found'
          ? 'No account found with that email.'
          : e.code === 'auth/too-many-requests'
          ? 'Too many attempts — try again later.'
          : e.code === 'auth/network-request-failed'
          ? 'Network error — check your connection.'
          : 'Error: ' + e.message;
      btn.disabled = false;
    });
}

function doForgotPassword() {
  var email = document.getElementById('loginEmail').value.trim();
  var err   = document.getElementById('loginErr');
  if (!email) { err.style.color = '#f59e0b'; err.textContent = 'Enter your email above first.'; return; }
  auth.sendPasswordResetEmail(email)
    .then(function() { err.style.color = '#10b981'; err.textContent = 'Reset email sent — check your inbox.'; })
    .catch(function(e) { err.style.color = '#ef4444'; err.textContent = 'Error: ' + e.message; });
}

function doSignOut() {
  if (!confirm('Sign out?')) return;
  auth.signOut();
}
</script>
</head>
<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h2>FD Event Planner</h2>
    <p>Funky Dory Events Management</p>
    <input type="email"    id="loginEmail" placeholder="Email"    autocomplete="username"/>
    <input type="password" id="loginPwd"   placeholder="Password" autocomplete="current-password"/>
    <div class="remember-row">
      <input type="checkbox" id="rememberMe" style="width:14px;height:14px;accent-color:#3b82f6;cursor:pointer" checked>
      <label for="rememberMe">Stay signed in</label>
    </div>
    <button class="signin-btn" id="signinBtn" onclick="doLogin()">Sign in</button>
    <div id="loginErr"></div>
    <div class="forgotlink" onclick="doForgotPassword()">Forgot password?</div>
  </div>
  <div id="loginVersion">FD Event Planner · hub v1.2.0</div>
</div>

<div id="shell">
  <div id="nav">
    <div id="nav-logo">FD<span>.</span>PLAN</div>
    <div id="nav-tabs">
      <div class="nav-tab" onclick="switchTab('todo')"    data-tab="todo">To-Do</div>
      <div class="nav-tab" onclick="switchTab('planner')" data-tab="planner">Site Planner</div>
      <div class="nav-tab" onclick="switchTab('kanban')"  data-tab="kanban">Kanban</div>
    </div>
    <div id="nav-right">
      <span id="nav-user"></span>
      <button class="nav-btn" onclick="doSignOut()">Sign out</button>
    </div>
  </div>
  <div id="content">
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p id="loading-msg">Loading...</p>
    </div>
    <iframe class="frame" id="frame-todo"    data-src="todo.html"          title="To-Do"></iframe>
    <iframe class="frame" id="frame-planner" data-src="venue-planner.html" title="Site Planner"></iframe>
    <iframe class="frame" id="frame-kanban"  data-src="kanban.html"        title="Kanban"></iframe>
  </div>
  <div id="statusbar">
    <span id="sb-auth">Connecting...</span>
  </div>
</div>

<script>
window._activeTab = null;

function switchTab(tab) {
  window._activeTab = tab;

  // Update nav tab styles
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    if (tabs[i].getAttribute('data-tab') === tab) tabs[i].classList.add('active');
  }

  // Hide all frames
  var frames = document.querySelectorAll('.frame');
  for (var j = 0; j < frames.length; j++) {
    frames[j].style.display = 'none';
  }

  // Show target frame
  var frame = document.getElementById('frame-' + tab);
  if (!frame) return;
  frame.style.display = 'block';

  // Load src if not already loaded
  if (!frame.getAttribute('data-loaded')) {
    frame.setAttribute('data-loaded', '1');
    var labels = { todo:'To-Do', planner:'Site Planner', kanban:'Kanban' };
    var loading = document.getElementById('loading');
    loading.classList.remove('hidden');
    document.getElementById('loading-msg').textContent = 'Loading ' + (labels[tab] || tab) + '...';
    frame.onload = function() { loading.classList.add('hidden'); };
    frame.src = frame.dataset.src;
  }
}

document.getElementById('loginPwd').addEventListener('keydown',   function(e) { if (e.key==='Enter') doLogin(); });
document.getElementById('loginEmail').addEventListener('keydown', function(e) { if (e.key==='Enter') doLogin(); });
</script>

</body>
</html>

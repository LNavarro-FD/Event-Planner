<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Event Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,sans-serif;background:#0f172a;overflow:hidden}

/* Login */
#loginOverlay{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#loginBox{background:#1e293b;border-radius:12px;padding:40px 44px;display:flex;flex-direction:column;gap:14px;min-width:320px;box-shadow:0 8px 40px #0008}
#loginBox h2{color:#fff;font-size:20px;font-weight:700;text-align:center}
#loginBox p{color:#64748b;font-size:12px;text-align:center;margin-top:-8px}
#loginBox input{padding:10px 14px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff;font-size:14px;outline:none;transition:border-color .15s}
#loginBox input:focus{border-color:#3b82f6}
#loginBox .signin{padding:11px;border-radius:8px;background:#3b82f6;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;letter-spacing:.02em}
#loginBox .signin:hover{background:#2563eb}
#loginErr{color:#ef4444;font-size:12px;text-align:center;min-height:16px}
.forgotlink{text-align:center;font-size:12px;color:#64748b;cursor:pointer;text-decoration:underline}
.forgotlink:hover{color:#94a3b8}
#loginVersion{font-size:10px;color:#334155;text-align:center}

/* Shell */
#shell{display:none;flex-direction:column;height:100vh}

/* Top nav */
#nav{background:#1e293b;height:48px;display:flex;align-items:center;flex-shrink:0;border-bottom:1px solid #334155}
#nav-logo{padding:0 16px;font-size:13px;font-weight:800;color:#fff;letter-spacing:-.01em;white-space:nowrap;border-right:1px solid #334155}
#nav-logo span{color:#3b82f6}
#nav-tabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:none;height:100%}
#nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{height:100%;padding:0 18px;display:flex;align-items:center;font-size:12px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;letter-spacing:.02em;text-transform:uppercase;user-select:none}
.nav-tab:hover{color:#cbd5e1}
.nav-tab.active{color:#fff;border-bottom-color:#3b82f6}
.nav-tab .tab-badge{font-size:9px;background:#334155;color:#94a3b8;padding:1px 5px;border-radius:8px;margin-left:6px}
.nav-tab.active .tab-badge{background:#1e40af;color:#bfdbfe}
#nav-right{display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;border-left:1px solid #334155}
#nav-user{font-size:11px;color:#64748b;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-btn{font-size:11px;padding:4px 10px;border:1px solid #334155;border-radius:6px;background:transparent;color:#94a3b8;cursor:pointer}
.nav-btn:hover{background:#334155;color:#fff}
#version-badge{font-size:9px;color:#334155;padding:0 8px;white-space:nowrap}

/* Content area */
#content{flex:1;position:relative;overflow:hidden}
.module-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff}
.module-frame.active{display:block}

/* Loading state */
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f1f5f9;flex-direction:column;gap:12px;z-index:10}
#loading.hidden{display:none}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:#64748b}

/* Status bar */
#statusbar{background:#0f172a;height:22px;display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0;border-top:1px solid #1e293b}
#sb-auth{font-size:10px;color:#10b981}
#sb-sync{font-size:10px;color:#64748b}
#sb-versions{font-size:10px;color:#334155;margin-left:auto}
</style>

<!-- Firebase (module — auth only in hub) -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, getIdToken } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// Config inline here only — modules load it from config.js
const FB_CONFIG = {
  apiKey:            'AIzaSyCt-MVurfEOcvj_4Q9ndD6dqJrf8hfm4x8',
  authDomain:        'event-planner-7944d.firebaseapp.com',
  projectId:         'event-planner-7944d',
  storageBucket:     'event-planner-7944d.firebasestorage.app',
  messagingSenderId: '455768566205',
  appId:             '1:455768566205:web:c5274d85158e6b2bf8cad4',
};

const app  = initializeApp(FB_CONFIG);
const auth = getAuth(app);

window._hubAuth = { auth, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, getIdToken };

onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
    document.getElementById('nav-user').textContent = user.email;
    document.getElementById('sb-auth').textContent = '● Connected — ' + user.email;
    // Get token and broadcast to all loaded iframes
    const token = await getIdToken(user);
    window._hubToken = token;
    window._hubUser  = { email: user.email, uid: user.uid };
    broadcastAuth(token, user.email);
    // Load default tab
    if (!window._activeTab) switchTab('todo');
  } else {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('shell').style.display = 'none';
    window._hubToken = null;
    window._hubUser  = null;
  }
});

// Broadcast auth token to all iframes via postMessage
function broadcastAuth(token, email) {
  document.querySelectorAll('.module-frame').forEach(iframe => {
    if (iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'FD_AUTH', token, email }, '*');
    }
  });
}

// Re-broadcast when a new iframe loads
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'FD_AUTH_REQUEST' && window._hubToken) {
    e.source.postMessage({ type: 'FD_AUTH', token: window._hubToken, email: window._hubUser?.email }, '*');
  }
  if (e.data && e.data.type === 'FD_SYNC_STATUS') {
    document.getElementById('sb-sync').textContent = e.data.msg;
  }
});
</script>
</head>
<body>

<!-- Login -->
<div id="loginOverlay">
  <div id="loginBox">
    <h2>FD Event Planner</h2>
    <p>Funky Dory Events Management</p>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="username"/>
    <input type="password" id="loginPwd" placeholder="Password" autocomplete="current-password"/>
    <button class="signin" onclick="doLogin()">Sign in</button>
    <div id="loginErr"></div>
    <div class="forgotlink" onclick="doForgotPassword()">Forgot password?</div>
  </div>
  <div id="loginVersion">FD Event Planner · hub v1.0.0</div>
</div>

<!-- Shell -->
<div id="shell">
  <div id="nav">
    <div id="nav-logo">FD<span>.</span>PLAN</div>
    <div id="nav-tabs">
      <div class="nav-tab" onclick="switchTab('todo')" data-tab="todo">
        To-Do <span class="tab-badge">FD7</span>
      </div>
      <div class="nav-tab" onclick="switchTab('planner')" data-tab="planner">
        Site Planner <span class="tab-badge">Layout</span>
      </div>
      <div class="nav-tab" onclick="switchTab('kanban')" data-tab="kanban">
        Kanban <span class="tab-badge">Jobs</span>
      </div>
    </div>
    <div id="nav-right">
      <span id="nav-user"></span>
      <button class="nav-btn" onclick="doSignOut()">Sign out</button>
    </div>
    <div id="version-badge">hub v1.0.0</div>
  </div>

  <div id="content">
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p id="loading-msg">Loading…</p>
    </div>
    <iframe class="module-frame" id="frame-todo"    src="" data-src="todo.html"           title="To-Do List"></iframe>
    <iframe class="module-frame" id="frame-planner" src="" data-src="venue-planner.html"  title="Site Planner"></iframe>
    <iframe class="module-frame" id="frame-kanban"  src="" data-src="kanban.html"          title="Kanban"></iframe>
  </div>

  <div id="statusbar">
    <span id="sb-auth">● Connecting…</span>
    <span id="sb-sync"></span>
    <span id="sb-versions">config v1.0.0 · planner v3.0.0 · todo v2.0.0 · kanban v2.0.0</span>
  </div>
</div>

<script>
// ── Tab switching ─────────────────────────────────────────────────────────────
window._activeTab = null;
const FRAME_IDS = { todo:'frame-todo', planner:'frame-planner', kanban:'frame-kanban' };

function switchTab(tab) {
  if (window._activeTab === tab) return;
  window._activeTab = tab;

  // Update tab styles
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  // Show/hide frames
  document.querySelectorAll('.module-frame').forEach(f => f.classList.remove('active'));
  const frame = document.getElementById(FRAME_IDS[tab]);
  if (!frame) return;

  // Lazy load — only set src on first visit
  if (!frame.src || frame.src === window.location.href) {
    const loading = document.getElementById('loading');
    const msg     = document.getElementById('loading-msg');
    const labels  = { todo:'To-Do List', planner:'Site Planner', kanban:'Kanban' };
    loading.classList.remove('hidden');
    msg.textContent = 'Loading ' + (labels[tab] || tab) + '…';

    frame.onload = () => {
      loading.classList.add('hidden');
      // Send auth token once loaded
      if (window._hubToken) {
        frame.contentWindow.postMessage({ type:'FD_AUTH', token:window._hubToken, email:window._hubUser?.email }, '*');
      }
    };
    frame.src = frame.dataset.src;
  }

  frame.classList.add('active');
}

// ── Auth functions ─────────────────────────────────────────────────────────────
function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const err   = document.getElementById('loginErr');
  if (!window._hubAuth) { err.style.color='#ef4444'; err.textContent='Still loading — please wait a moment.'; return; }
  err.textContent = 'Signing in…';
  err.style.color = '#64748b';
  const { auth, signInWithEmailAndPassword } = window._hubAuth;
  signInWithEmailAndPassword(auth, email, pwd)
    .then(() => { err.textContent = ''; })
    .catch(e => {
      err.style.color = '#ef4444';
      err.textContent = e.code === 'auth/invalid-credential' ? 'Incorrect email or password.' : 'Error: ' + e.message;
    });
}

function doForgotPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  const err   = document.getElementById('loginErr');
  if (!window._hubAuth) { err.style.color='#f59e0b'; err.textContent='Still loading — please wait.'; return; }
  if (!email) { err.style.color='#f59e0b'; err.textContent='Enter your email above first.'; return; }
  const { auth, sendPasswordResetEmail } = window._hubAuth;
  sendPasswordResetEmail(auth, email)
    .then(() => { err.style.color='#10b981'; err.textContent='Reset email sent — check your inbox.'; })
    .catch(e => { err.style.color='#ef4444'; err.textContent='Error: ' + e.message; });
}

function doSignOut() {
  if (!window._hubAuth) return;
  if (!confirm('Sign out?')) return;
  window._hubAuth.signOut(window._hubAuth.auth);
}

// Keyboard shortcut: Enter on password field
document.getElementById('loginPwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

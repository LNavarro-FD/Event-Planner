<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Festival 7 — Master To-Do List v2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;background:#f5f5f5;color:#222;padding:24px}
h1{font-size:20px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:20px}
.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #ddd;border-radius:8px;padding:12px 20px;min-width:110px;text-align:center}
.stat .n{font-size:24px;font-weight:700}
.stat .l{font-size:11px;color:#888;margin-top:2px}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filters button{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer}
.filters button.active{background:#FF4B7B;color:#fff;border-color:#FF4B7B}
.section{background:#fff;border:1px solid #ddd;border-radius:8px;margin-bottom:16px;overflow:hidden}
.sec-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;padding:10px 14px;background:#f9f9f9;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-hdr:hover{background:#f0f0f0}
.sec-hdr.all-done{background:#f0f7ec;border-bottom-color:#d4eac8}
.sec-hdr.all-done .sec-title{color:#3b6d11}
.sec-hdr.collapsed{border-bottom:none}
.sec-body{display:block}
.sec-body.collapsed{display:none}
.sec-chevron{font-size:14px;color:#ccc;margin-left:8px;transition:transform .15s;flex-shrink:0}
.sec-meta{font-size:11px;font-weight:400;color:#aaa;margin-left:8px;text-transform:none;letter-spacing:0}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:.5px solid #f0f0f0;cursor:pointer}
.item:last-child{border-bottom:none}
.item:hover{background:#fafafa}
.item.done .lbl{text-decoration:line-through;color:#aaa}
input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:#FF4B7B;width:15px;height:15px;cursor:pointer}
.lbl{flex:1;line-height:1.4}
.note{display:block;font-size:12px;color:#888;margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.urgent{background:#fde8e8;color:#a32d2d}
.pending{background:#fef0d6;color:#854f0b}
.ok{background:#eaf3de;color:#3b6d11}
.in-progress{background:#e3f2fd;color:#1565c0}
.blocked{background:#f3e5f5;color:#6a1b9a}
.waiting{background:#fff8e1;color:#e65100}
.status-sel{font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:5px;font-family:Arial,sans-serif;background:#fff;cursor:pointer;color:#444}
.status-sel:focus{outline:none;border-color:#FF4B7B}
.item-notes{display:none;padding:8px 14px 10px 39px;border-top:.5px solid #f0f0f0;background:#fafafa}
.item-notes.open{display:block}
.note-log{margin-bottom:6px}
.note-entry{font-size:12px;color:#444;padding:4px 0;border-bottom:.5px solid #eee;line-height:1.5}
.note-entry:last-child{border-bottom:none}
.note-ts{font-size:11px;color:#aaa;margin-right:6px}
.note-del{font-size:11px;color:#ddd;cursor:pointer;margin-left:6px;border:none;background:none;padding:0}
.note-del:hover{color:#a32d2d}
.note-input-row{display:flex;gap:6px;margin-top:4px}
.note-input-row input{flex:1;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-family:Arial,sans-serif}
.note-input-row button{font-size:12px;padding:5px 10px;background:#22224C;color:#fff;border:none;border-radius:5px;cursor:pointer;white-space:nowrap}
.notes-toggle{font-size:11px;color:#aaa;cursor:pointer;border:none;background:none;padding:0 0 0 4px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.notes-toggle:hover{color:#22224C}
.inline-notes{padding:4px 14px 8px 39px;background:inherit}
.inline-note-entry{font-size:12px;color:#555;padding:2px 0;line-height:1.5;display:flex;align-items:baseline;gap:6px}
.inline-note-ts{font-size:11px;color:#bbb;white-space:nowrap;flex-shrink:0}
.inline-sub-entry{font-size:12px;color:#555;padding:2px 0;display:flex;align-items:center;gap:6px}


/* ── Swimlane ─────────────────────────────────────────── */
#swimlane{background:#fff;border:1px solid #ddd;border-radius:8px;margin-bottom:20px;overflow:hidden}
#swimlane-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;padding:10px 14px;background:#f9f9f9;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
#swimlane-title:hover{background:#f0f0f0}
#swimlane-body{overflow-x:auto}
.sl-table{border-collapse:collapse;width:100%;min-width:600px;font-size:12px}
.sl-table th{padding:7px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #e0e0e0;white-space:nowrap;position:sticky;top:0;background:#fff;z-index:1}
.sl-table th.cat-th{text-align:left;min-width:180px;background:#f9f9f9}
.sl-table td{padding:5px 8px;border-bottom:.5px solid #f0f0f0;text-align:center;vertical-align:middle}
.sl-table td.cat-td{text-align:left;font-size:11px;color:#555;padding-left:14px;background:#fafafa;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.sl-table tr:hover td{background:#f5f5f5}
.sl-table tr:hover td.cat-td{background:#f0f0f0}
.sl-chip{display:inline-block;min-width:28px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;transition:transform .1s}
.sl-chip:hover{transform:scale(1.1)}
.sl-chip.empty{background:#f3f4f6;color:#d1d5db;cursor:default;font-weight:400}
.sl-chip.empty:hover{transform:none}
.sl-chip.design{background:#ede9fe;color:#6d28d9}
.sl-chip.purchase{background:#dbeafe;color:#1d4ed8}
.sl-chip.build{background:#ccfbf1;color:#0f766e}
.sl-chip.done{background:#dcfce7;color:#15803d}
.sl-chip.all-done{background:#15803d;color:#fff}
.sl-progress{height:3px;background:#e5e7eb;border-radius:2px;margin-top:3px;overflow:hidden}
.sl-progress-bar{height:100%;background:#15803d;border-radius:2px;transition:width .3s}
.sl-col-header-design{color:#6d28d9}
.sl-col-header-purchase{color:#1d4ed8}
.sl-col-header-build{color:#0f766e}
.sl-col-header-done{color:#15803d}
.sl-filter-active{outline:2px solid #FF4B7B;outline-offset:2px}
</style>


<!-- Firebase & Config -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-firestore.min.js"></script>
<script src="fd-firebase.js"></script>
<script src="config.js"></script>
<script src="seed-data.js"></script>
<script>
// Seed on first load, then initialise
FD_SEED.init().then(function() { window._fbLoad(); });
</script>
</head>
<body>
<div id="mainContent">
<div id="fd-debug" style="background:#1e293b;color:#10b981;font-family:monospace;font-size:11px;padding:10px;margin:8px;border-radius:6px;max-height:200px;overflow-y:auto"></div>
<h1>Funky Dory Festival 7 — 2026</h1>
<p class="sub">Master to-do list · Sat 15 Aug 2026 · Ashfields Carriage &amp; Polo Club, CM6 1JU <span id="saveStatus"></span></p>



<div class="stats" id="stats"></div>
<div id="swimlane">
  <div id="swimlane-title" onclick="toggleSwimlane()">
    <span>📊 Lifecycle Overview — click a cell to filter</span>
    <span id="sl-chevron" style="color:#ccc;font-size:14px">▾</span>
  </div>
  <div id="swimlane-body">
    <table class="sl-table" id="sl-table">
      <thead>
        <tr>
          <th class="cat-th">Category</th>
          <th class="sl-col-header-design">Design</th>
          <th class="sl-col-header-purchase">Purchase / Book</th>
          <th class="sl-col-header-build">Print / Build</th>
          <th class="sl-col-header-done">Done</th>
          <th style="color:#94a3b8;font-size:10px">Progress</th>
        </tr>
      </thead>
      <tbody id="sl-body"></tbody>
    </table>
  </div>
</div>

<div style="background:#fff;border:1px solid #ddd;border-radius:8px;margin-bottom:20px;overflow:hidden">
  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;padding:10px 14px;background:#f9f9f9;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between">
    <span>General notes</span>
    <span id="notes-saved" style="font-size:11px;color:#3b6d11;font-weight:400;display:none">Saved</span>
  </div>
  <textarea id="notes-area" placeholder="Add notes here..." style="width:100%;min-height:100px;border:none;padding:12px 14px;font-family:Arial,sans-serif;font-size:13px;color:#222;resize:vertical;background:#fff;outline:none;line-height:1.6"></textarea>
</div>

<div class="filters">
  <button class="active" onclick="setFilter('all',this)">All</button>
  <button onclick="setFilter('urgent',this)">Urgent</button>
  <button onclick="setFilter('in-progress',this)">In progress</button>
  <button onclick="setFilter('waiting',this)">Waiting</button>
  <button onclick="setFilter('blocked',this)">Blocked</button>
  <button onclick="setFilter('pending',this)">Pending</button>
  <button onclick="setFilter('done',this)">Ticked off</button>
</div>

<div style="margin-bottom:16px">
  <button id="add-toggle" style="font-size:13px;padding:7px 16px;border-radius:20px;border:1px solid #FF4B7B;background:#FF4B7B;color:#fff;cursor:pointer;font-weight:600">+ Add task</button>
</div>
<div id="add-form" style="display:none;background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px">
  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:12px">New task</div>
  <div style="margin-bottom:10px">
    <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Task title *</label>
    <input id="new-title" type="text" placeholder="What needs doing?" style="width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:Arial,sans-serif">
  </div>
  <div style="margin-bottom:10px">
    <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Note / detail</label>
    <input id="new-note" type="text" placeholder="Optional extra detail" style="width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:Arial,sans-serif">
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
    <div style="flex:1;min-width:180px">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Category</label>
      <select id="new-cat" style="width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:Arial,sans-serif"></select>
    </div>
    <div style="flex:1;min-width:120px">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Priority</label>
      <select id="new-status" style="width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:Arial,sans-serif">
        <option value="pending">Pending</option>
        <option value="urgent">Urgent</option>
      </select>
    </div>
  </div>
  <input id="new-cat-name" type="text" placeholder="New category name" style="display:none;width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:Arial,sans-serif;margin-bottom:10px">
  <button onclick="addTask()" style="padding:7px 20px;background:#22224C;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">Add task</button>
</div>

<div id="list"></div>
</div>

<script>
var sections = [];
// ── Firebase state ────────────────────────────────────────
let done={}, custom=[], itemLogs={}, subs={}, overrides={}, generalNotes='';
let saveTimer=null;

const FB_DOC='fd7_todo_2026';

window._fbLoad=async function(){
  var dbg=document.getElementById('fd-debug');
  function log(msg){ if(dbg){ dbg.innerHTML+='<div>'+msg+'</div>'; } console.log('[FD]',msg); }
  log('_fbLoad started');
  log('FD_DB: '+(window.FD_DB?'OK':'MISSING'));
  log('FD_CONFIG: '+(window.FD_CONFIG?'OK':'MISSING'));
  log('FD_SEED: '+(window.FD_SEED?'OK (sections='+FD_SEED.todoSections.length+')':'MISSING'));
  try{
    var CFG = window.FD_CONFIG;
    var docPath = CFG ? CFG.db.todos.fd7 : 'fd7_todo_2026';
    log('Loading: todos/'+docPath);
    var data = await FD.get('todos', docPath);
    log('Data received: '+(data?'yes':'null'));
    if(data){
      log('data.sections: '+(data.sections?data.sections.length+' items':'missing'));
      if(data.sections && data.sections.length){
        sections = data.sections;
        log('sections loaded from Firestore: '+sections.length);
      } else {
        sections = window.FD_SEED ? window.FD_SEED.todoSections : [];
        log('sections from seed: '+sections.length);
        if(sections.length){ FD.set('todos', docPath, Object.assign({}, data, {sections: sections})); }
      }
      done=data.done||{}; custom=data.custom||[]; itemLogs=data.itemLogs||{};
      subs=data.subs||{}; overrides=data.overrides||{}; generalNotes=data.generalNotes||'';
    } else {
      sections = window.FD_SEED ? window.FD_SEED.todoSections : [];
      log('No doc — using seed sections: '+sections.length);
    }
  }catch(e){
    log('ERROR: '+e.message);
    sections = window.FD_SEED ? window.FD_SEED.todoSections : [];
    log('Fallback seed sections: '+sections.length);
  }
  log('Final sections.length: '+sections.length);
  document.getElementById('notes-area').value=generalNotes;
  stats(); render(); populateCatDropdown(); renderSwimlane();
  log('render() complete');
};

function fbSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await FD.set('todos', FB_DOC, {done,custom,itemLogs,subs,overrides,generalNotes});
      const s=document.getElementById('saveStatus');
      s.textContent='✓ Saved';
      setTimeout(()=>s.textContent='',2000);
    }catch(e){console.warn('Save failed',e);}
  },800);
}

// Notes area
(function(){
  const ta=document.getElementById('notes-area');
  ta.addEventListener('input',function(){generalNotes=this.value;fbSave();});
})();

function effectiveStatus(item,key){return overrides[key]||item.s;}
function changeStatus(key,val){overrides[key]=val;fbSave();stats();render();}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function fmtTs(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function allCats(){
  const cats=sections.map(s=>s.cat);
  custom.forEach(c=>{if(!cats.includes(c.cat))cats.push(c.cat);});
  return cats;
}

function stats(){
  let t=0,d=0,u=0,p=0;
  const count=(key,item)=>{
    t++;const es=effectiveStatus(item,key);
    if(done[key])d++;
    else if(es==='urgent')u++;
    else p++;
  };
  sections.forEach(s=>s.items.forEach((item,i)=>count(s.cat+'_h_'+i,item)));
  custom.forEach(item=>count('_c_'+item.id,item));
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="n">${t}</div><div class="l">Total</div></div>`+
    `<div class="stat"><div class="n" style="color:#a32d2d">${u}</div><div class="l">Urgent</div></div>`+
    `<div class="stat"><div class="n" style="color:#854f0b">${p}</div><div class="l">Pending</div></div>`+
    `<div class="stat"><div class="n" style="color:#3b6d11">${d}</div><div class="l">Done</div></div>`;
}

let cur='all';
function setFilter(f,btn){
  cur=f;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addItemNote(key,inputId){
  const inp=document.getElementById(inputId);
  const text=inp.value.trim();
  if(!text)return;
  if(!itemLogs[key])itemLogs[key]=[];
  itemLogs[key].push({ts:Date.now(),text});
  fbSave();inp.value='';renderLog(key);renderInline(key);
}
function deleteItemNote(key,idx){
  if(!itemLogs[key])return;
  itemLogs[key].splice(idx,1);
  fbSave();renderLog(key);renderInline(key);
}
function renderLog(key){
  const el=document.getElementById('log_'+key);
  if(!el)return;
  const logs=itemLogs[key]||[];
  el.innerHTML=logs.length===0?'<div style="font-size:11px;color:#ccc;padding:2px 0">No notes yet</div>':
    logs.map((e,i)=>`<div class="note-entry"><span class="note-ts">${fmtTs(e.ts)}</span>${e.text}<button class="note-del" onclick="deleteItemNote('${key.replace(/'/g,"\'")}',${i})" title="Delete">✕</button></div>`).join('');
}

function addSub(parentKey,inputId){
  const inp=document.getElementById(inputId);
  const text=inp.value.trim();
  if(!text)return;
  if(!subs[parentKey])subs[parentKey]=[];
  subs[parentKey].push({id:uid(),t:text,done:false});
  fbSave();inp.value='';renderSubs(parentKey);renderInline(parentKey);
}
function toggleSub(parentKey,subId){
  if(!subs[parentKey])return;
  const s=subs[parentKey].find(x=>x.id===subId);
  if(s){s.done=!s.done;fbSave();renderSubs(parentKey);renderInline(parentKey);}
}
function deleteSub(parentKey,subId){
  if(!subs[parentKey])return;
  subs[parentKey]=subs[parentKey].filter(x=>x.id!==subId);
  fbSave();renderSubs(parentKey);renderInline(parentKey);
}
function renderSubs(parentKey){
  const el=document.getElementById('subs_'+parentKey);
  if(!el)return;
  const list=subs[parentKey]||[];
  el.innerHTML=list.map(s=>`
    <div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:.5px solid #eee">
      <input type="checkbox" ${s.done?'checked':''} style="accent-color:#FF4B7B;width:13px;height:13px;flex-shrink:0" onchange="toggleSub('${parentKey.replace(/'/g,"\'")}','${s.id}')">
      <span style="flex:1;font-size:12px;color:${s.done?'#bbb':'#333'};${s.done?'text-decoration:line-through':''}">${s.t}</span>
      <button onclick="deleteSub('${parentKey.replace(/'/g,"\'")}','${s.id}')" style="border:none;background:none;cursor:pointer;color:#ddd;font-size:13px;padding:0" onmouseover="this.style.color='#a32d2d'" onmouseout="this.style.color='#ddd'">×</button>
    </div>`).join('');
}

function renderInline(key){
  const el=document.getElementById('inline_'+key);
  if(!el)return;
  const logs=itemLogs[key]||[];
  const subList=subs[key]||[];
  const safeKey=key.replace(/'/g,"\'");
  let html='';
  subList.forEach(s=>{
    html+=`<div class="inline-sub-entry"><input type="checkbox" ${s.done?'checked':''} style="accent-color:#FF4B7B;width:13px;height:13px;flex-shrink:0;cursor:pointer" onchange="toggleSub('${safeKey}','${s.id}')"><span style="font-size:12px;color:${s.done?'#bbb':'#555'};${s.done?'text-decoration:line-through':''}">${s.t}</span></div>`;
  });
  logs.forEach(e=>{
    html+=`<div class="inline-note-entry"><span class="inline-note-ts">${fmtTs(e.ts)}</span><span>${e.text}</span></div>`;
  });
  el.innerHTML=html;
  el.style.display=html?'block':'none';
}

function makeRow(item,key,isCustom){
  const d=!!done[key];
  const es=effectiveStatus(item,key);
  // Swimlane filter
  if (slFilter) {
    const taskCat = isCustom ? item.cat : key.split('_h_')[0];
    const taskStage = getTaskStage(key, item);
    if (taskCat !== slFilter.cat || taskStage !== slFilter.stage) return null;
  } else {
    const show=cur==='all'
      ||(cur==='done'&&d)
      ||(!d&&es===cur)
      ||(cur==='pending'&&!d&&(es==='pending'||!['urgent','in-progress','blocked','waiting'].includes(es)));
    if(!show)return null;
  }

  const bm={
    urgent:'<span class="badge urgent">Urgent</span>',
    pending:'<span class="badge pending">Pending</span>',
    'in-progress':'<span class="badge in-progress">In progress</span>',
    blocked:'<span class="badge blocked">Blocked</span>',
    waiting:'<span class="badge waiting">Waiting</span>'
  };
  const logCount=(itemLogs[key]||[]).length;
  const subList=subs[key]||[];
  const subCount=subList.length;
  const subDone=subList.filter(x=>x.done).length;
  const subBadge=subCount?`<span style="font-size:11px;color:#888;background:#f0f0f0;padding:1px 7px;border-radius:20px;margin-left:4px">${subDone}/${subCount} sub-tasks</span>`:'';
  const noteBadge=logCount?`<span style="font-size:11px;color:#888;background:#f0f0f0;padding:1px 7px;border-radius:20px;margin-left:4px">${logCount} note${logCount>1?'s':''}</span>`:'';

  const wrap=document.createElement('div');
  const row=document.createElement('div');
  row.className='item'+(d?' done':'');
  row.style.cursor='default';
  const safeKey=key.replace(/'/g,"\'");
  const delBtn=isCustom?`<button onclick="deleteCustom('${item.id}')" title="Delete" style="border:none;background:none;cursor:pointer;color:#ddd;font-size:16px;padding:0 2px;flex-shrink:0" onmouseover="this.style.color='#a32d2d'" onmouseout="this.style.color='#ddd'">×</button>`:'';
  row.innerHTML=`
    <input type="checkbox"${d?' checked':''} style="margin-top:3px">
    <div class="lbl">
      <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:4px">
        <span>${item.t}</span>${subBadge}${noteBadge}
      </div>
      ${item.n?`<span class="note">${item.n}</span>`:''}
    </div>
    ${d?'<span class="badge ok">Done</span>':(bm[es]||'')}
    <button class="notes-toggle" id="toggle_${safeKey}" onclick="togglePanel('${safeKey}')">▸ details</button>
    ${delBtn}`;
  row.querySelector('input').onchange=function(){done[key]=this.checked;fbSave();stats();render();};
  wrap.appendChild(row);

  const inlineEl=document.createElement('div');
  inlineEl.className='inline-notes';
  inlineEl.id='inline_'+key;
  wrap.appendChild(inlineEl);
  setTimeout(()=>renderInline(key),0);

  const panel=document.createElement('div');
  panel.className='item-notes';
  panel.id='panel_'+key;
  const noteInputId='ninp_'+key;
  const subInputId='sinp_'+key;
  const selOpts=['urgent','pending','in-progress','blocked','waiting'].map(v=>`<option value="${v}"${es===v?' selected':''}>${v.charAt(0).toUpperCase()+v.slice(1).replace('-',' ')}</option>`).join('');
  panel.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#aaa">Status</span>
      <select class="status-sel" onchange="changeStatus('${safeKey}',this.value)">${selOpts}</select>
      ${overrides[key]?'<span style="font-size:11px;color:#FF4B7B">● overridden</span>':''}
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:6px">Sub-tasks</div>
        <div id="subs_${key}" style="margin-bottom:8px"></div>
        <div class="note-input-row">
          <input id="${subInputId}" type="text" placeholder="Add sub-task…" onkeydown="if(event.key==='Enter')addSub('${safeKey}','${subInputId}')">
          <button onclick="addSub('${safeKey}','${subInputId}')">Add</button>
        </div>
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:6px">Notes</div>
        <div class="note-log" id="log_${key}"></div>
        <div class="note-input-row">
          <input id="${noteInputId}" type="text" placeholder="Add a note…" onkeydown="if(event.key==='Enter')addItemNote('${safeKey}','${noteInputId}')">
          <button onclick="addItemNote('${safeKey}','${noteInputId}')">Add</button>
        </div>
      </div>
    </div>`;
  wrap.appendChild(panel);
  setTimeout(()=>{renderLog(key);renderSubs(key);},0);
  return wrap;
}

function togglePanel(key){
  const panel=document.getElementById('panel_'+key);
  const btn=document.getElementById('toggle_'+key);
  if(!panel)return;
  const open=panel.classList.toggle('open');
  if(btn)btn.textContent=open?'▾ details':'▸ details';
}

const COLLAPSE_KEY='fd7_2026_collapsed';
let collapsedSections={};
try{const v=localStorage.getItem(COLLAPSE_KEY);if(v)collapsedSections=JSON.parse(v);}catch(e){}
function saveCollapsed(){try{localStorage.setItem(COLLAPSE_KEY,JSON.stringify(collapsedSections));}catch(e){}}
function toggleSection(cat){
  collapsedSections[cat]=!collapsedSections[cat];
  saveCollapsed();
  const safeId=cat.replace(/[^a-z0-9]/gi,'_');
  const body=document.getElementById('secbody_'+safeId);
  const hdr=document.getElementById('sechdr_'+safeId);
  const chev=document.getElementById('secchev_'+safeId);
  if(body)body.classList.toggle('collapsed',!!collapsedSections[cat]);
  if(hdr)hdr.classList.toggle('collapsed',!!collapsedSections[cat]);
  if(chev)chev.style.transform=collapsedSections[cat]?'rotate(-90deg)':'rotate(0deg)';
}

function render(){
  const el=document.getElementById('list');
  el.innerHTML='';
  allCats().forEach(cat=>{
    const safeId=cat.replace(/[^a-z0-9]/gi,'_');
    const isCollapsed=!!collapsedSections[cat];
    let total=0,doneCount=0;
    const sec=sections.find(s=>s.cat===cat);
    if(sec)sec.items.forEach((it,i)=>{total++;if(done[cat+'_h_'+i])doneCount++;});
    custom.filter(c=>c.cat===cat).forEach(it=>{total++;if(done['_c_'+it.id])doneCount++;});
    const allDone=total>0&&doneCount===total;
    const sd=document.createElement('div');
    sd.className='section';
    const hdr=document.createElement('div');
    hdr.id='sechdr_'+safeId;
    hdr.className='sec-hdr'+(allDone?' all-done':'')+(isCollapsed?' collapsed':'');
    hdr.onclick=()=>toggleSection(cat);
    hdr.innerHTML=`<div style="display:flex;align-items:center;flex:1;min-width:0">
      <span class="sec-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span>
      <span class="sec-meta">${doneCount}/${total}</span>
      ${allDone?'<span style="font-size:10px;background:#3b6d11;color:#fff;padding:1px 7px;border-radius:20px;margin-left:8px;text-transform:none;letter-spacing:0;font-weight:400">All done</span>':''}
    </div>
    <span class="sec-chevron" id="secchev_${safeId}" style="transform:${isCollapsed?'rotate(-90deg)':'rotate(0deg)'}">▾</span>`;
    sd.appendChild(hdr);
    const body=document.createElement('div');
    body.id='secbody_'+safeId;
    body.className='sec-body'+(isCollapsed?' collapsed':'');
    let count=0;
    if(sec){sec.items.forEach((item,i)=>{const row=makeRow(item,cat+'_h_'+i,false);if(row){body.appendChild(row);count++;}});}
    custom.filter(c=>c.cat===cat).forEach(item=>{const row=makeRow(item,'_c_'+item.id,true);if(row){body.appendChild(row);count++;}});
    sd.appendChild(body);
    if(count>0)el.appendChild(sd);
  });
  renderSwimlane();
}

function populateCatDropdown(){
  const sel=document.getElementById('new-cat');
  const prev=sel.value;
  sel.innerHTML='';
  allCats().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===prev)o.selected=true;sel.appendChild(o);});
  const o=document.createElement('option');o.value='__new__';o.textContent='+ New category…';sel.appendChild(o);
}

function addTask(){
  const title=document.getElementById('new-title').value.trim();
  if(!title){alert('Please enter a task title.');return;}
  let cat=document.getElementById('new-cat').value;
  if(cat==='__new__'){cat=document.getElementById('new-cat-name').value.trim();if(!cat){alert('Please enter a category name.');return;}}
  const note=document.getElementById('new-note').value.trim();
  const status=document.getElementById('new-status').value;
  const id=uid();
  custom.push({id,cat,t:title,n:note,s:status});
  fbSave();
  document.getElementById('new-title').value='';
  document.getElementById('new-note').value='';
  document.getElementById('new-cat-name').value='';
  document.getElementById('new-cat-name').style.display='none';
  document.getElementById('add-form').style.display='none';
  document.getElementById('add-toggle').textContent='+ Add task';
  populateCatDropdown();stats();render();
}

function deleteCustom(id){
  if(!confirm('Delete this task?'))return;
  custom=custom.filter(c=>c.id!==id);
  delete done['_c_'+id];delete itemLogs['_c_'+id];delete subs['_c_'+id];
  fbSave();stats();render();populateCatDropdown();
}

document.getElementById('new-cat').addEventListener('change',function(){
  document.getElementById('new-cat-name').style.display=this.value==='__new__'?'block':'none';
});
document.getElementById('add-toggle').addEventListener('click',function(){
  const f=document.getElementById('add-form');
  const open=f.style.display==='block';
  f.style.display=open?'none':'block';
  this.textContent=open?'+ Add task':'✕ Cancel';
  if(!open)populateCatDropdown();
});


// ── Swimlane ──────────────────────────────────────────────────────────────────
// Each task gets a lifecycle stage based on its status and done state
// Design = not started, nothing done yet
// Purchase/Book = in-progress / waiting / blocked
// Print/Build = has sub-tasks started or status=in-progress on build-type tasks
// Done = ticked off

let slFilter = null; // {cat, stage} or null

function getTaskStage(key, item) {
  if (done[key]) return 'done';
  const es = effectiveStatus(item, key);
  if (es === 'in-progress') return 'build';
  if (es === 'waiting' || es === 'blocked') return 'purchase';
  if (es === 'urgent' || es === 'pending') {
    // Check if any sub-tasks exist — means work has started
    const subList = subs[key] || [];
    const logs = itemLogs[key] || [];
    if (subList.length > 0 || logs.length > 0) return 'purchase';
    return 'design';
  }
  return 'design';
}

function renderSwimlane() {
  const body = document.getElementById('sl-body');
  if (!body) return;
  
  const stages = ['design', 'purchase', 'build', 'done'];
  const rows = [];

  allCats().forEach(cat => {
    const counts = {design:0, purchase:0, build:0, done:0};
    const sec = sections.find(s => s.cat === cat);
    if (sec) {
      sec.items.forEach((item, i) => {
        const key = cat + '_h_' + i;
        counts[getTaskStage(key, item)]++;
      });
    }
    custom.filter(c => c.cat === cat).forEach(item => {
      const key = '_c_' + item.id;
      counts[getTaskStage(key, item)]++;
    });
    const total = counts.design + counts.purchase + counts.build + counts.done;
    if (total === 0) return;
    rows.push({cat, counts, total});
  });

  body.innerHTML = rows.map(({cat, counts, total}) => {
    const pct = Math.round((counts.done / total) * 100);
    const allDone = counts.done === total;
    
    const makeChip = (stage, count) => {
      if (count === 0) return `<span class="sl-chip empty">—</span>`;
      const isActive = slFilter && slFilter.cat === cat && slFilter.stage === stage;
      const cls = allDone && stage === 'done' ? 'all-done' : stage;
      return `<span class="sl-chip ${cls}${isActive ? ' sl-filter-active' : ''}" onclick="setSLFilter('${cat.replace(/'/g,"\'")}','${stage}')">${count}</span>`;
    };

    return `<tr>
      <td class="cat-td" title="${cat}">${cat}</td>
      <td>${makeChip('design', counts.design)}</td>
      <td>${makeChip('purchase', counts.purchase)}</td>
      <td>${makeChip('build', counts.build)}</td>
      <td>${makeChip('done', counts.done)}</td>
      <td style="min-width:80px;padding:4px 12px">
        <div style="font-size:10px;color:#94a3b8;text-align:right;margin-bottom:2px">${pct}%</div>
        <div class="sl-progress"><div class="sl-progress-bar" style="width:${pct}%"></div></div>
      </td>
    </tr>`;
  }).join('');
}

function setSLFilter(cat, stage) {
  // Toggle off if already active
  if (slFilter && slFilter.cat === cat && slFilter.stage === stage) {
    slFilter = null;
  } else {
    slFilter = {cat, stage};
    // Reset status filter to all
    cur = 'all';
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    document.querySelector('.filters button').classList.add('active');
  }
  renderSwimlane();
  render();
}

let swimlaneCollapsed = false;
function toggleSwimlane() {
  swimlaneCollapsed = !swimlaneCollapsed;
  document.getElementById('swimlane-body').style.display = swimlaneCollapsed ? 'none' : 'block';
  document.getElementById('sl-chevron').style.transform = swimlaneCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
}

// ── Auth ─────────────────────────────────────────────────
function isInHub() { try { return window.parent !== window; } catch(e) { return false; } }

  if (isInHub()) {
    // Hide login, show app — hub handles auth
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'FD_AUTH' && window._fb && !window._fbUser) {
        // Sign in with custom token approach — or just trust parent auth state
        // Since Firebase auth persists via indexedDB across same origin, 
        // the iframe will pick up the session automatically.
        // We just need to trigger our load function.
        if (window._loadTasks) window._loadTasks();
        if (window._fbLoad) window._fbLoad();
        if (window._fbLoadAndInit) window._fbLoadAndInit();
      }
    });
    // Request auth token from parent immediately
    try { window.parent.postMessage({ type: 'FD_AUTH_REQUEST' }, '*'); } catch(e) {}

    // Also notify parent of save events
    window._notifyHubSync = function(msg) {
      try { window.parent.postMessage({ type: 'FD_SYNC_STATUS', msg }, '*'); } catch(e) {}
    };
  }
})();

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f3f4f6;color:#1f2937;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Login */
#loginOverlay{position:fixed;inset:0;background:#1a1a18;display:flex;align-items:center;justify-content:center;z-index:9999;}
#loginBox{background:#2c2c2a;border-radius:10px;padding:36px 40px;display:flex;flex-direction:column;gap:14px;min-width:300px;box-shadow:0 8px 32px #0008;}
#loginBox h2{color:#fff;font-size:18px;text-align:center;}
#loginBox input{padding:9px 12px;border-radius:6px;border:1px solid #444;background:#1a1a18;color:#fff;font-size:14px;outline:none;}
#loginBox input:focus{border-color:#185FA5;}
#loginBox button.signin{padding:10px;border-radius:6px;background:#185FA5;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;}
#loginBox button.signin:hover{background:#1a70c0;}
#loginErr{color:#e74c3c;font-size:13px;text-align:center;min-height:18px;}
.forgotlink{text-align:center;font-size:12px;color:#888;cursor:pointer;text-decoration:underline;}

/* Top bar */
#topbar{background:#1f2937;color:#fff;padding:0 16px;height:46px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#topbar h1{font-size:15px;font-weight:700;color:#fff;margin-right:8px;}
#topbar span.sub{font-size:12px;color:#9ca3af;}
#topbar .spacer{flex:1;}
#userEmail{font-size:11px;color:#6b7280;}
#topbar button{font-size:11px;padding:4px 10px;border:1px solid #374151;border-radius:4px;background:transparent;color:#9ca3af;cursor:pointer;}
#topbar button:hover{background:#374151;color:#fff;}

/* Filters */
#filters{background:#fff;border-bottom:1px solid #e5e7eb;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
#filters label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;}
#filters select, #filters input{font-size:12px;padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;background:#f9fafb;color:#374151;}
#filters input{width:200px;}
.filter-btn{font-size:11px;padding:4px 10px;border:1px solid #d1d5db;border-radius:4px;background:#f9fafb;color:#374151;cursor:pointer;}
.filter-btn.active{background:#185FA5;color:#fff;border-color:#185FA5;}
#taskCount{font-size:11px;color:#9ca3af;margin-left:auto;}

/* Stats bar */
#statsbar{background:#f9fafb;border-bottom:1px solid #e5e7eb;padding:6px 16px;display:flex;gap:16px;flex-shrink:0;}
.stat{font-size:11px;display:flex;align-items:center;gap:5px;}
.stat-dot{width:8px;height:8px;border-radius:50%;}
.stat span{color:#6b7280;}
.stat strong{color:#1f2937;}

/* Task list */
#taskList{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;}

/* Task card */
.task-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s;}
.task-card:hover{box-shadow:0 2px 8px #0001;}
.task-card.done{opacity:.6;}
.task-card.stuck{border-left:3px solid #ef4444;}

.task-left{flex:1;min-width:0;}
.task-cat{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:2px;}
.task-name{font-size:13px;font-weight:600;color:#111827;margin-bottom:4px;}
.task-supplier{font-size:11px;color:#6b7280;margin-bottom:6px;}
.task-notes-preview{font-size:11px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px;}

/* Pipeline */
.pipeline{display:flex;align-items:center;gap:0;margin-top:8px;}
.pipe-step{font-size:10px;padding:3px 10px;border:1px solid #d1d5db;background:#f9fafb;color:#9ca3af;cursor:pointer;white-space:nowrap;}
.pipe-step:first-child{border-radius:4px 0 0 4px;}
.pipe-step:last-child{border-radius:0 4px 4px 0;}
.pipe-step.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:600;}
.pipe-step.completed{background:#d1fae5;color:#065f46;border-color:#6ee7b7;}
.pipe-step.current{background:#fef3c7;color:#92400e;border-color:#fcd34d;font-weight:600;}
.pipe-arrow{font-size:10px;color:#d1d5db;margin:0 2px;}

.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.status-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;}
.badge-ns{background:#f3f4f6;color:#6b7280;}
.badge-ip{background:#dbeafe;color:#1e40af;}
.badge-stuck{background:#fee2e2;color:#991b1b;}
.badge-done{background:#d1fae5;color:#065f46;}
.due-date{font-size:10px;color:#9ca3af;}
.advance-btn{font-size:11px;padding:3px 10px;background:#185FA5;color:#fff;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;}
.advance-btn:hover{background:#1a70c0;}
.advance-btn:disabled{background:#d1d5db;color:#9ca3af;cursor:default;}

/* Detail panel */
#detailPanel{position:fixed;right:0;top:0;bottom:0;width:380px;background:#fff;border-left:1px solid #e5e7eb;box-shadow:-4px 0 20px #0002;z-index:500;display:none;flex-direction:column;}
#detailPanel.open{display:flex;}
#dpHeader{padding:16px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:flex-start;}
#dpHeader h3{font-size:14px;font-weight:700;color:#111827;flex:1;margin-right:8px;}
#dpClose{background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3af;flex-shrink:0;}
#dpBody{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.dp-field label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;display:block;margin-bottom:4px;}
.dp-field p{font-size:13px;color:#374151;}
.dp-field select, .dp-field input[type=date], .dp-field textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;color:#374151;font-family:inherit;}
.dp-field textarea{min-height:80px;resize:vertical;}
#dpSave{margin:16px;padding:10px;background:#185FA5;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
#dpSave:hover{background:#1a70c0;}

.section-header{background:#f3f4f6;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}

/* Notify */
#notify{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;display:none;z-index:999;}

/* Overlay backdrop */
#overlay{position:fixed;inset:0;background:#0003;z-index:499;display:none;}
#overlay.open{display:block;}
</style>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCt-MVurfEOcvj_4Q9ndD6dqJrf8hfm4x8",
  authDomain: "event-planner-7944d.firebaseapp.com",
  projectId: "event-planner-7944d",
  storageBucket: "event-planner-7944d.firebasestorage.app",
  messagingSenderId: "455768566205",
  appId: "1:455768566205:web:c5274d85158e6b2bf8cad4"
});

const auth = getAuth(app);
const db = getFirestore(app);

window._fb = { auth, db, doc, getDoc, setDoc, signInWithEmailAndPassword, signOut, sendPasswordResetEmail };

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('userEmail').textContent = user.email;
    window._fbUser = user;
    window._loadTasks();
  } else {
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});
</script>

<div id="statsbar"></div>

<div id="taskList"></div>

</div>

        <option>Stuck</option>
        <option>Done</option>

    </div>
    <div class="dp-field">
      <label>Due Date</label>
      <input type="date" id="dpDue"/>
    </div>
    <div class="dp-field">
      <label>Your Notes</label>

    </div>
  </div>
  <button id="dpSave" onclick="saveDetail()">Save</button>
</div>

<div id="notify"></div>

const CATEGORIES = ["Commercial", "Design & Print", "DJ, Stage & Dancefloor", "Artist Liaison", "Entrance \u2014 VIP/Artist", "Entrance \u2014 Main", "Infrastructure", "Toilets", "Bars", "Furniture", "Lighting", "Fencing", "Security", "Food", "Entertainment", "FD Village", "Logistics", "Staffing", "Decor", "Marketing", "On The Day"];

const STAGE_LABELS = { D: 'Design', P: 'Purchase / Book', B: 'Print / Build', X: 'Done' };

let tasks = [];
let selectedId = null;

// ── Firebase ───────────────────────────────────────────────────────────────────
async function fbSave() {
  if (!window._fb || !window._fbUser) return;
  const { db, doc, setDoc } = window._fb;
  try {
    await setDoc(doc(db, 'jobs', 'fd7_2026'), { tasks: tasks });
  } catch(e) { console.warn('Save failed', e); }
}

window._loadTasks = async function() {
  if (!window._fb || !window._fbUser) return;
  const { db, doc, getDoc } = window._fb;
  try {
    const snap = await getDoc(doc(db, 'jobs', 'fd7_2026'));
    if (snap.exists()) {
      const saved = snap.data().tasks;
      // Merge saved state into task defs (in case new tasks added)
      tasks = TASK_DEFS.map(def => {
        const s = saved.find(t => t.id === def.id);
        return s ? { ...def, currentStage: s.currentStage, status: s.status, dueDate: s.dueDate || '', taskNotes: s.taskNotes || '' } : { ...def };
      });
    } else {
      tasks = TASK_DEFS.map(d => ({ ...d }));
    }
  } catch(e) {
    tasks = TASK_DEFS.map(d => ({ ...d }));
  }
  populateFilters();
  renderStats();
  renderTasks();
};

// ── Filters ────────────────────────────────────────────────────────────────────
function populateFilters() {
  const sel = document.getElementById('filterCat');
  CATEGORIES.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function getFiltered() {
  const cat = document.getElementById('filterCat').value;
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  return tasks.filter(t => {
    if (cat && t.cat !== cat) return false;
    if (status && t.status !== status) return false;
    if (search && !t.task.toLowerCase().includes(search) && !t.supplier.toLowerCase().includes(search)) return false;
    return true;
  });
}

// ── Stats ──────────────────────────────────────────────────────────────────────
function renderStats() {
  const ns = tasks.filter(t => t.status === 'Not Started').length;
  const ip = tasks.filter(t => t.status === 'In Progress').length;
  const st = tasks.filter(t => t.status === 'Stuck').length;
  const dn = tasks.filter(t => t.status === 'Done').length;
  const total = tasks.length;
  const pct = Math.round(dn / total * 100);
  document.getElementById('statsbar').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:#9ca3af"></div><span>Not started</span><strong>${ns}</strong></div>
    <div class="stat"><div class="stat-dot" style="background:#3b82f6"></div><span>In progress</span><strong>${ip}</strong></div>
    <div class="stat"><div class="stat-dot" style="background:#ef4444"></div><span>Stuck</span><strong>${st}</strong></div>
    <div class="stat"><div class="stat-dot" style="background:#10b981"></div><span>Done</span><strong>${dn}</strong></div>
    <div class="stat" style="margin-left:auto;"><span>Overall progress</span><strong>${pct}% (${dn}/${total})</strong></div>
  `;
}

// ── Render tasks ───────────────────────────────────────────────────────────────
function renderTasks() {
  const filtered = getFiltered();
  document.getElementById('taskCount').textContent = `${filtered.length} tasks`;
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  let lastCat = '';
  filtered.forEach(t => {
    if (t.cat !== lastCat) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = t.cat;
      list.appendChild(hdr);
      lastCat = t.cat;
    }

    const card = document.createElement('div');
    const isDone = t.status === 'Done';
    const isStuck = t.status === 'Stuck';
    card.className = 'task-card' + (isDone ? ' done' : '') + (isStuck ? ' stuck' : '');
    card.onclick = () => openDetail(t.id);

    // Build pipeline
    const stageHtml = buildPipeline(t, true);

    // Status badge
    const badgeClass = { 'Not Started': 'badge-ns', 'In Progress': 'badge-ip', 'Stuck': 'badge-stuck', 'Done': 'badge-done' }[t.status] || 'badge-ns';

    // Current stage label
    const currentStageLetter = t.stages[t.currentStage];
    const currentStageLabel = STAGE_LABELS[currentStageLetter] || '';

    card.innerHTML = `
      <div class="task-left">
        <div class="task-cat">${t.cat}</div>
        <div class="task-name">${t.task}</div>
        ${t.supplier ? `<div class="task-supplier">📦 ${t.supplier}</div>` : ''}
        ${t.notes ? `<div class="task-notes-preview">${t.notes}</div>` : ''}
        <div class="pipeline" style="margin-top:8px;">${stageHtml}</div>
      </div>
      <div class="task-right">
        <span class="status-badge ${badgeClass}">${t.status}</span>
        ${t.dueDate ? `<span class="due-date">📅 ${formatDate(t.dueDate)}</span>` : ''}
        ${!isDone ? `<button class="advance-btn" onclick="event.stopPropagation();advanceTask(${t.id})">
          ${currentStageLetter === 'X' ? 'Mark done' : '→ ' + currentStageLabel}
        </button>` : '<span style="font-size:11px;color:#10b981;font-weight:600;">✓ Complete</span>'}
      </div>
    `;
    list.appendChild(card);
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:40px;font-size:14px;">No tasks match your filters</div>';
  }
}

function buildPipeline(t, compact) {
  return t.stages.map((s, i) => {
    let cls = 'pipe-step';
    if (i < t.currentStage) cls += ' completed';
    else if (i === t.currentStage && t.status !== 'Done') cls += ' current';
    else if (t.status === 'Done') cls += ' completed';
    return `<span class="${cls}">${STAGE_LABELS[s]}</span>`;
  }).join('<span class="pipe-arrow">›</span>');
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

// ── Advance task ───────────────────────────────────────────────────────────────
function advanceTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (t.currentStage < t.stages.length - 1) {
    t.currentStage++;
  }
  if (t.currentStage === t.stages.length - 1) {
    t.status = 'Done';
  } else if (t.status === 'Not Started') {
    t.status = 'In Progress';
  }
  fbSave();
  renderStats();
  renderTasks();
  notify('Updated ✓');
}

// ── Detail panel ───────────────────────────────────────────────────────────────
function openDetail(id) {
  selectedId = id;
  const t = tasks.find(t => t.id === id);
  document.getElementById('dpTitle').textContent = t.task;
  document.getElementById('dpCat').textContent = t.cat;
  document.getElementById('dpSupplier').textContent = t.supplier || '—';
  document.getElementById('dpNotes').textContent = t.notes || '—';
  document.getElementById('dpPipeline').innerHTML = buildPipeline(t, false);
  document.getElementById('dpStatus').value = t.status;
  document.getElementById('dpDue').value = t.dueDate || '';
  document.getElementById('dpTaskNotes').value = t.taskNotes || '';
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  selectedId = null;
}

function saveDetail() {
  const t = tasks.find(t => t.id === selectedId);
  if (!t) return;
  t.status = document.getElementById('dpStatus').value;
  t.dueDate = document.getElementById('dpDue').value;
  t.taskNotes = document.getElementById('dpTaskNotes').value;
  if (t.status === 'Done') t.currentStage = t.stages.length - 1;
  fbSave();
  renderStats();
  renderTasks();
  closeDetail();
  notify('Saved ✓');
}

// ── Auth ───────────────────────────────────────────────────────────────────────
function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const err = document.getElementById('loginErr');
  err.textContent = 'Signing in…';
  const { auth, signInWithEmailAndPassword } = window._fb;
  signInWithEmailAndPassword(auth, email, pwd)
    .then(() => { err.textContent = ''; })
    .catch(e => { err.textContent = e.code === 'auth/invalid-credential' ? 'Incorrect email or password.' : 'Error: ' + e.message; });
}

function doForgotPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  const err = document.getElementById('loginErr');
  if (!email) { err.style.color='#e67e22'; err.textContent = 'Enter your email above first.'; return; }
  const { auth, sendPasswordResetEmail } = window._fb;
  sendPasswordResetEmail(auth, email)
    .then(() => { err.style.color='#27ae60'; err.textContent = 'Reset email sent — check your inbox.'; })
    .catch(e => { err.style.color='#e74c3c'; err.textContent = 'Error: ' + e.message; });
}

function doSignOut() {
  if (!confirm('Sign out?')) return;
  const { auth, signOut } = window._fb;
  signOut(auth);
}

function notify(msg) {
  const n = document.getElementById('notify');
  n.textContent = msg; n.style.display = 'block';
  clearTimeout(n._t);
  n._t = setTimeout(() => { n.style.display = 'none'; }, 2000);
}

document.getElementById('loginPwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Staff Database</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f1f5f9;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#1e293b;height:44px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
#topbar h1{color:#fff;font-size:14px;font-weight:700;margin-right:8px}
.view-btn{padding:5px 14px;border-radius:20px;border:1px solid #475569;background:transparent;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.view-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
#searchbar{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;align-items:center;flex-wrap:wrap}
#searchbar input{padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;width:200px;outline:none}
#searchbar input:focus{border-color:#3b82f6}
#searchbar select{padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;background:#fff;outline:none;cursor:pointer}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
#content{flex:1;overflow-y:auto;padding:16px}

/* People cards */
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.person-card{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:14px;cursor:pointer;transition:box-shadow .15s}
.person-card:hover{box-shadow:0 2px 8px #0001}
.person-card.expanded{grid-column:span 2}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pc-name{font-weight:700;font-size:14px;color:#1e293b}
.pc-section{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.pc-role{font-size:11px;color:#64748b;margin-bottom:6px}
.pc-contact{font-size:11px;color:#475569;display:flex;flex-direction:column;gap:2px}
.pc-contact a{color:#3b82f6;text-decoration:none}
.pc-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.pc-badge{font-size:10px;padding:2px 6px;background:#f1f5f9;border-radius:4px;color:#64748b}
.pc-health{font-size:10px;padding:2px 6px;background:#fef2f2;border-radius:4px;color:#dc2626}
.pc-expand{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px;padding:0 4px}
.pc-details{margin-top:12px;padding-top:12px;border-top:1px solid #f1f5f9;display:none}
.pc-details.open{display:block}
.detail-row{display:flex;gap:8px;margin-bottom:6px;font-size:11px}
.detail-label{color:#94a3b8;min-width:90px}
.detail-val{color:#1e293b}

/* Shifts */
.shifts-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px}
.shifts-table th{background:#f8fafc;padding:4px 8px;text-align:left;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0}
.shifts-table td{padding:4px 8px;border-bottom:1px solid #f1f5f9}
.shift-chip{background:#dbeafe;color:#1d4ed8;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}

/* Add person form */
.add-btn{padding:6px 14px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.add-btn:hover{background:#2563eb}
.form-overlay{position:fixed;inset:0;background:#0007;z-index:100;display:flex;align-items:center;justify-content:center;display:none}
.form-overlay.open{display:flex}
.form-box{background:#fff;border-radius:12px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.form-box h3{font-size:16px;font-weight:700;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:span 2}
.form-field label{font-size:11px;font-weight:600;color:#64748b}
.form-field input,.form-field select,.form-field textarea{padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.form-field input:focus,.form-field select:focus{border-color:#3b82f6}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.btn-cancel{padding:7px 14px;background:#f1f5f9;border:none;border-radius:6px;cursor:pointer;font-size:12px}
.btn-save{padding:7px 14px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}

/* Assignments view */
.assign-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0}
.assign-table th{background:#f8fafc;padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:#64748b;border-bottom:1px solid #e2e8f0}
.assign-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:12px}
.assign-table tr:hover td{background:#f8fafc}
.confirmed{color:#15803d;font-weight:600}
.pending{color:#d97706;font-weight:600}

/* Section colours */
.s-Bar{background:#dbeafe;color:#1e40af}
.s-Crew{background:#ede9fe;color:#5b21b6}
.s-Artist{background:#fce7f3;color:#9d174d}
.s-Supplier{background:#dcfce7;color:#14532d}
.s-Entertainment{background:#ffedd5;color:#9a3412}
.s-Flyers{background:#f1f5f9;color:#475569}
.s-Visuals{background:#fef9c3;color:#713f12}

/* Roles view */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.role-card{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:14px}
.role-card h4{font-size:13px;font-weight:700;margin-bottom:4px}
.role-count{font-size:11px;color:#64748b;margin-bottom:8px}
.role-people{display:flex;flex-direction:column;gap:4px}
.role-person{font-size:11px;padding:4px 8px;background:#f8fafc;border-radius:4px;display:flex;justify-content:space-between}

#statusbar{background:#0f172a;height:22px;display:flex;align-items:center;padding:0 12px;flex-shrink:0}
#statusbar span{font-size:10px;color:#334155}

/* Shift editor */
.shift-row{display:grid;grid-template-columns:110px 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:8px;background:#f8fafc;border-radius:6px;border:1px solid #e2e8f0}
.shift-row label{font-size:10px;font-weight:600;color:#64748b;display:block;margin-bottom:2px}
.shift-input{padding:6px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:monospace;width:100%;outline:none}
.shift-input:focus{border-color:#3b82f6}
.shift-hrs{font-size:12px;font-weight:700;color:#1d4ed8;text-align:center;min-width:32px}
.shift-del{background:none;border:none;cursor:pointer;color:#ef4444;font-size:16px;padding:4px}
.confirmed-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b;margin-top:4px}
.confirmed-toggle input{accent-color:#15803d}


@media print {
  @page { size: A4 landscape; margin: 14mm; }
  #topbar, #searchbar, .add-btn, .view-btn, button, .form-overlay, #statusbar { display: none !important; }
  body { background: #fff !important; font-size: 11px !important; overflow: visible !important; height: auto !important; }
  #content { overflow: visible !important; height: auto !important; padding: 0 !important; }
  #print-header { display: block !important; }
  #print-footer { display: block !important; }
  .person-card { break-inside: avoid; border: 1px solid #e2e8f0 !important; margin-bottom: 6px !important; }
  .assign-table { font-size: 9px !important; }
  .assign-table th, .assign-table td { padding: 4px 6px !important; }
}
#print-header { display: none; font-family: system-ui, sans-serif; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #1e293b; }
#print-header h2 { font-size: 16px; font-weight: 700; color: #1e293b; }
#print-header .ph-meta { font-size: 10px; color: #64748b; margin-top: 3px; display: flex; gap: 20px; flex-wrap: wrap; }
#print-footer { display: none; margin-top: 8px; border-top: 1px solid #e2e8f0; padding-top: 4px; font-family: system-ui, sans-serif; }
#print-footer .pf-meta { font-size: 9px; color: #94a3b8; display: flex; justify-content: space-between; }

</style>

  <button class="view-btn" onclick="setView('roles')">Roles</button>

    <option>Crew</option>
    <option>Artist</option>
    <option>Supplier</option>
    <option>Entertainment</option>
    <option>Visuals</option>

    <option value="FD7">FD7 2026</option>

    <span id="ph-printed"></span>

</div>
<div id="print-footer">

</div>

<div id="content"></div>

<div id="statusbar"><span>FD Staff v1.2.0</span></div>

<!-- Add/Edit Person Form -->
<div class="form-overlay" id="personForm">

    <div class="form-grid">

      <div class="form-field"><label>Last name</label><input id="fLast" type="text"></div>
      <div class="form-field"><label>Email</label><input id="fEmail" type="email"></div>
      <div class="form-field"><label>Phone</label><input id="fPhone" type="tel"></div>
      <div class="form-field"><label>Emergency contact</label><input id="fEmContact" type="text"></div>
      <div class="form-field"><label>Emergency phone</label><input id="fEmPhone" type="tel"></div>
      <div class="form-field"><label>Section</label>
        <select id="fSection">
          <option>Bar</option><option>Crew</option><option>Artist</option>
          <option>Supplier</option><option>Entertainment</option><option>Visuals</option>
        </select>
      </div>
      <div class="form-field"><label>Default rate £/hr</label><input id="fRate" type="number" step="0.5"></div>
      <div class="form-field"><label>T-shirt size</label>
        <select id="fSize"><option></option><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option></select>
      </div>
      <div class="form-field"><label>Neck shape</label>
        <select id="fNeck"><option></option><option>Round</option><option>V Neck</option></select>
      </div>
      <div class="form-field"><label>Car reg</label><input id="fCar" type="text"></div>
      <div class="form-field"><label>Last event</label><input id="fLastEvent" type="text" placeholder="e.g. HRR26"></div>
      <div class="form-field full"><label>Health notes</label><input id="fHealth" type="text" placeholder="Allergies, conditions etc."></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      <button class="btn-save" onclick="savePerson()">Save</button>
    </div>
  </div>
</div>

var people      = [];
var assignments = [];
var currentView = 'people';
var editingId   = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function calcHours(shift) {
  if (!shift || !shift.start || !shift.end) return 0;
  var s = shift.start.split(':').map(Number);
  var e = shift.end.split(':').map(Number);
  var sh = s[0]*60 + s[1];
  var eh = e[0]*60 + e[1];
  if (eh <= sh) eh += 24*60; // overnight
  return Math.round((eh - sh) / 60 * 10) / 10;
}

function totalHours(assignment) {
  var h = 0;
  (assignment.shifts || []).forEach(function(s) {
    h += calcHours(s.day) + calcHours(s.eve);
  });
  return Math.round(h * 10) / 10;
}

function sectionClass(sec) {
  return 's-' + (sec || '').replace(/\s/g,'');
}

function fmt24(t) {
  return t || '';
}

function shiftLabel(shift) {
  if (!shift || !shift.start) return '';
  return fmt24(shift.start) + (shift.end ? '–' + fmt24(shift.end) : '');
}

function personName(p) {
  return (p.firstName + ' ' + (p.lastName || '')).trim();
}

// ── Views ─────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(function(b, i) {
    b.classList.toggle('active', ['people','assignments','roles'][i] === v);
  });
  render();
}

function render() {
  var q   = document.getElementById('searchInput').value.toLowerCase();
  var sec = document.getElementById('sectionFilter').value;
  var evt = document.getElementById('eventFilter').value;

  if (currentView === 'people') renderPeople(q, sec, evt);
  else if (currentView === 'assignments') renderAssignments(q, sec, evt);
  else renderRoles(q, sec, evt);
}

function renderPeople(q, sec, evt) {
  var filtered = people.filter(function(p) {
    if (q && !personName(p).toLowerCase().includes(q) && !p.email.toLowerCase().includes(q)) return false;
    if (sec && p.section !== sec) return false;
    if (evt) {
      var hasEvent = assignments.some(function(a) { return a.personId === p.id && a.event === evt; });
      if (!hasEvent) return false;
    }
    return true;
  });

  document.getElementById('countLabel').textContent = filtered.length + ' people';

  var html = '<div class="people-grid">';
  filtered.forEach(function(p) {
    var myAssigns = assignments.filter(function(a) { return a.personId === p.id; });
    var roles = myAssigns.map(function(a) { return a.role; }).filter(function(r,i,arr) { return arr.indexOf(r) === i; }).join(', ');
    var events = myAssigns.map(function(a) { return a.event; }).filter(function(e,i,arr) { return arr.indexOf(e) === i; }).join(', ');
    var totalH = 0;
    myAssigns.forEach(function(a) { totalH += totalHours(a); });

    html += '<div class="person-card" id="pc_' + p.id + '">';
    html += '<div class="pc-top">';
    html += '<div>';
    html += '<div class="pc-name">' + personName(p) + '</div>';
    html += '<div class="pc-role">' + (roles || 'No role assigned') + '</div>';
    html += '</div>';
    html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">';
    html += '<span class="pc-section pill ' + sectionClass(p.section) + '">' + p.section + '</span>';
    html += '<button class="pc-expand" onclick="toggleExpand(\'' + p.id + '\',event)">⋯</button>';
    html += '</div></div>';
    html += '<div class="pc-contact">';
    if (p.email) html += '<a href="mailto:' + p.email + '">' + p.email + '</a>';
    if (p.phone) html += '<span>📞 ' + p.phone + '</span>';
    html += '</div>';
    html += '<div class="pc-meta">';
    if (p.lastEvent) html += '<span class="pc-badge">Last: ' + p.lastEvent + '</span>';
    if (events) html += '<span class="pc-badge">' + events + '</span>';
    if (totalH > 0) html += '<span class="pc-badge">' + totalH + 'h total</span>';
    if (p.tshirtSize) html += '<span class="pc-badge">T: ' + p.tshirtSize + (p.neckShape ? ' ' + p.neckShape : '') + '</span>';
    if (p.health) html += '<span class="pc-health">⚠ ' + p.health + '</span>';
    html += '</div>';

    // Expandable detail
    html += '<div class="pc-details" id="pcd_' + p.id + '">';
    if (p.emergencyContact) html += '<div class="detail-row"><span class="detail-label">Emergency</span><span class="detail-val">' + p.emergencyContact + (p.emergencyPhone ? ' · ' + p.emergencyPhone : '') + '</span></div>';
    if (p.carReg) html += '<div class="detail-row"><span class="detail-label">Car reg</span><span class="detail-val">' + p.carReg + '</span></div>';
    if (p.defaultRate) html += '<div class="detail-row"><span class="detail-label">Rate</span><span class="detail-val">£' + p.defaultRate + '/hr</span></div>';

    // Shifts table
    var allShifts = [];
    myAssigns.forEach(function(a) {
      (a.shifts || []).forEach(function(s) {
        if (s.day || s.eve) allShifts.push({event: a.event, role: a.role, date: s.date, day: s.day, eve: s.eve});
      });
    });
    if (allShifts.length > 0) {
      html += '<table class="shifts-table"><thead><tr><th>Event</th><th>Date</th><th>Role</th><th>Day</th><th>Eve</th><th>Hrs</th></tr></thead><tbody>';
      allShifts.forEach(function(s) {
        var h = calcHours(s.day) + calcHours(s.eve);
        html += '<tr><td>' + s.event + '</td><td>' + s.date + '</td><td>' + s.role + '</td>';
        html += '<td>' + (s.day ? '<span class="shift-chip">' + shiftLabel(s.day) + '</span>' : '–') + '</td>';
        html += '<td>' + (s.eve ? '<span class="shift-chip">' + shiftLabel(s.eve) + '</span>' : '–') + '</td>';
        html += '<td>' + (h > 0 ? h : '–') + '</td></tr>';
      });
      html += '</tbody></table>';
    }
    html += '<div style="margin-top:10px;display:flex;gap:8px">';
    html += '<button class="add-btn" onclick="openEditPerson(\'' + p.id + '\',event)" style="font-size:11px;padding:4px 10px">Edit</button>';
    html += '<button onclick="copyPerson(\'' + p.id + '\',event)" style="font-size:11px;padding:4px 10px;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;color:#15803d;cursor:pointer">Copy as template</button>';
    html += '</div>';
    html += '</div>'; // pc-details
    html += '</div>'; // person-card
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function renderAssignments(q, sec, evt) {
  var filtered = assignments.filter(function(a) {
    var p = people.find(function(x) { return x.id === a.personId; });
    if (!p) return false;
    if (q && !personName(p).toLowerCase().includes(q)) return false;
    if (sec && a.section !== sec) return false;
    if (evt && a.event !== evt) return false;
    return true;
  });

  document.getElementById('countLabel').textContent = filtered.length + ' assignments';

  var html = '<table class="assign-table"><thead><tr><th>Name</th><th>Event</th><th>Section</th><th>Role</th><th>Status</th><th>Shifts</th><th>Total Hrs</th><th>Rate</th><th></th></tr></thead><tbody>';
  filtered.forEach(function(a, idx) {
    var p = people.find(function(x) { return x.id === a.personId; });
    var name = p ? personName(p) : a.personId;
    var h = totalHours(a);
    var shiftSummary = (a.shifts || []).map(function(s) {
      var parts = [];
      if (s.day && s.day.start) parts.push(s.date.slice(5) + ' ' + shiftLabel(s.day));
      if (s.eve && s.eve.start) parts.push(s.date.slice(5) + ' eve ' + shiftLabel(s.eve));
      return parts.join(', ');
    }).filter(Boolean).join('<br>');

    html += '<tr>';
    html += '<td style="font-weight:600">' + name + '</td>';
    html += '<td>' + a.event + '</td>';
    html += '<td><span class="pill ' + sectionClass(a.section) + '">' + a.section + '</span></td>';
    html += '<td>' + (a.role || '—') + '</td>';
    html += '<td class="' + (a.confirmed ? 'confirmed' : 'pending') + '">' + (a.confirmed ? '✓ Confirmed' : '⏳ Pending') + '</td>';
    html += '<td style="font-size:10px;font-family:monospace">' + (shiftSummary || '<span style="color:#94a3b8">Default: ' + defaultShiftStart(a.event) + '</span>') + '</td>';
    html += '<td>' + (h > 0 ? h + 'h' : '—') + '</td>';
    html += '<td>' + (a.rate ? '£' + a.rate + '/hr' : '—') + '</td>';
    html += '<td><button onclick="openShiftEditor(\'' + a.personId + '\',' + idx + ')" style="font-size:11px;padding:3px 8px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;cursor:pointer;color:#1d4ed8">Edit shifts</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('content').innerHTML = html;
}

function renderRoles(q, sec, evt) {
  // Group assignments by role
  var roles = {};
  assignments.forEach(function(a) {
    if (evt && a.event !== evt) return;
    if (sec && a.section !== sec) return;
    var key = (a.event || '') + '::' + (a.role || 'Unassigned');
    if (!roles[key]) roles[key] = { event: a.event, role: a.role, section: a.section, people: [] };
    var p = people.find(function(x) { return x.id === a.personId; });
    if (p) {
      var name = personName(p);
      if (q && !name.toLowerCase().includes(q)) return;
      roles[key].people.push({ name: name, confirmed: a.confirmed, hours: totalHours(a) });
    }
  });

  document.getElementById('countLabel').textContent = Object.keys(roles).length + ' roles';

  var html = '<div class="roles-grid">';
  Object.values(roles).forEach(function(r) {
    html += '<div class="role-card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    html += '<h4>' + (r.role || 'Unassigned') + '</h4>';
    html += '<span class="pill ' + sectionClass(r.section) + '">' + r.section + '</span>';
    html += '</div>';
    html += '<div class="role-count">' + r.event + ' · ' + r.people.length + ' ' + (r.people.length === 1 ? 'person' : 'people') + '</div>';
    html += '<div class="role-people">';
    r.people.forEach(function(rp) {
      html += '<div class="role-person">';
      html += '<span>' + (rp.confirmed ? '✓' : '⏳') + ' ' + rp.name + '</span>';
      html += '<span style="color:#94a3b8">' + (rp.hours > 0 ? rp.hours + 'h' : '') + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function copyPerson(id, e) {
  e.stopPropagation();
  var p = people.find(function(x){ return x.id === id; });
  if (!p) return;

  // Pre-fill form with copied values but clear personal info
  editingId = null;
  document.getElementById('formTitle').textContent = 'New person (copied from ' + personName(p) + ')';

  // Clear personal info
  document.getElementById('fFirst').value     = '';
  document.getElementById('fLast').value      = '';
  document.getElementById('fEmail').value     = '';
  document.getElementById('fPhone').value     = '';
  document.getElementById('fEmContact').value = '';
  document.getElementById('fEmPhone').value   = '';
  document.getElementById('fHealth').value    = '';
  document.getElementById('fCar').value       = '';

  // Copy role/logistics info
  document.getElementById('fSection').value   = p.section   || 'Bar';
  document.getElementById('fRate').value      = p.defaultRate|| '';
  document.getElementById('fSize').value      = p.tshirtSize || '';
  document.getElementById('fNeck').value      = p.neckShape  || '';
  document.getElementById('fLastEvent').value = '';

  document.getElementById('personForm').classList.add('open');
  document.getElementById('fFirst').focus();
}

function closeForm() {
  document.getElementById('personForm').classList.remove('open');
}

async function savePerson() {
  var fn = document.getElementById('fFirst').value.trim();
  if (!fn) { alert('First name required'); return; }
  var ln = document.getElementById('fLast').value.trim();
  var id = editingId || (fn + '_' + ln).toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');

  var p = {
    id: id,
    firstName: fn,
    lastName: ln,
    email:            document.getElementById('fEmail').value.trim(),
    phone:            document.getElementById('fPhone').value.trim(),
    emergencyContact: document.getElementById('fEmContact').value.trim(),
    emergencyPhone:   document.getElementById('fEmPhone').value.trim(),
    health:           document.getElementById('fHealth').value.trim(),
    carReg:           document.getElementById('fCar').value.trim(),
    defaultRate:      parseFloat(document.getElementById('fRate').value) || 0,
    tshirtSize:       document.getElementById('fSize').value,
    neckShape:        document.getElementById('fNeck').value,
    section:          document.getElementById('fSection').value,
    lastEvent:        document.getElementById('fLastEvent').value.trim(),
    status: 'active',
  };

  // Update local
  var idx = people.findIndex(function(x) { return x.id === id; });
  if (idx >= 0) people[idx] = p;
  else people.push(p);

  // Save to Firestore
  try {
    await _db.collection('staff').doc('people').set({ list: people });
  } catch(e) { console.warn('Save failed', e); }

  closeForm();
  render();
}

var EVENT_TIMES = {
  'HRR26': { start: '12:00', end: '23:00', date: '2026-07-04' },
  'FD7':   { start: '12:00', end: '22:00', date: '2026-08-15' },
  'FD Shindig': { start: '12:00', end: '22:00', date: '2026-08-15' },
};

function defaultShiftStart(event) {
  var et = EVENT_TIMES[event];
  if (!et) return '11:00';
  var parts = et.start.split(':').map(Number);
  var h = parts[0] - 1;
  if (h < 0) h = 23;
  return String(h).padStart(2,'0') + ':' + String(parts[1]).padStart(2,'0');
}

function defaultShiftEnd(event) {
  var et = EVENT_TIMES[event];
  return et ? et.end : '23:00';
}

  document.getElementById('pf-right').textContent   = 'Staff v1.2.0 · ' + dateStr;
  window.print();
}

async function init() {
  try {
    var snap = await _db.collection('staff').doc('people').get();
    if (snap.exists && snap.data().list && snap.data().list.length > 0) {
      people = snap.data().list;
    } else {
      // Seed from HRR26 data
      people = SEED_PEOPLE;
      await _db.collection('staff').doc('people').set({ list: people });
    }

    var snap2 = await _db.collection('staff').doc('assignments').get();
    if (snap2.exists && snap2.data().list && snap2.data().list.length > 0) {
      assignments = snap2.data().list;
    } else {
      assignments = SEED_ASSIGNMENTS;
      await _db.collection('staff').doc('assignments').set({ list: assignments });
    }
  } catch(e) {
    console.warn('Firestore failed, using seed data', e);
    people = SEED_PEOPLE;
    assignments = SEED_ASSIGNMENTS;
  }
  render();
}

var _shiftPersonId   = null;
var _shiftAssignIdx  = null;
var _shiftEventKey   = null;

function openShiftEditor(personId, assignIdx) {
  var p = people.find(function(x){ return x.id === personId; });
  var a = assignments[assignIdx];
  if (!p || !a) return;

  _shiftPersonId  = personId;
  _shiftAssignIdx = assignIdx;
  _shiftEventKey  = a.event;

  document.getElementById('shiftFormTitle').textContent = personName(p) + ' — shifts';
  document.getElementById('shiftFormSub').textContent   = a.role + ' · ' + a.event;
  document.getElementById('shiftRate').value            = a.rate || p.defaultRate || '';

  // Build shift rows
  document.getElementById('shiftRows').innerHTML = '';
  var shifts = a.shifts && a.shifts.length ? a.shifts : [makeDefaultShift(a.event)];
  shifts.forEach(function(s, i){ appendShiftRow(s, i); });

  updateShiftTotals();
  document.getElementById('shiftForm').classList.add('open');
}

function makeDefaultShift(event) {
  var et = EVENT_TIMES[event] || { start:'12:00', end:'22:00', date:'' };
  var startH = parseInt(et.start.split(':')[0]) - 1;
  if (startH < 0) startH = 23;
  var defStart = String(startH).padStart(2,'0') + ':' + et.start.split(':')[1];
  return { date: et.date || '', day: { start: defStart, end: et.end }, eve: null };
}

function appendShiftRow(shift, idx) {
  var container = document.getElementById('shiftRows');
  var div = document.createElement('div');
  div.className = 'shift-row';
  div.id = 'srow_' + idx;

  var dayStart  = (shift.day && shift.day.start) || '';
  var dayEnd    = (shift.day && shift.day.end)   || '';
  var eveStart  = (shift.eve && shift.eve.start) || '';
  var eveEnd    = (shift.eve && shift.eve.end)   || '';

  div.innerHTML =
    '<div>' +
      '<label>Date</label>' +
      '<input class="shift-input" type="date" id="sd_'+idx+'" value="'+shift.date+'" onchange="updateShiftTotals()">' +
    '</div>' +
    '<div>' +
      '<label>Day shift</label>' +
      '<div style="display:flex;gap:4px">' +
        '<input class="shift-input" type="time" id="sds_'+idx+'" value="'+dayStart+'" placeholder="11:00" onchange="updateShiftTotals()" style="flex:1">' +
        '<span style="align-self:center;color:#94a3b8;font-size:11px">–</span>' +
        '<input class="shift-input" type="time" id="sde_'+idx+'" value="'+dayEnd+'" placeholder="22:00" onchange="updateShiftTotals()" style="flex:1">' +
      '</div>' +
    '</div>' +
    '<div>' +
      '<label>Eve shift</label>' +
      '<div style="display:flex;gap:4px">' +
        '<input class="shift-input" type="time" id="ses_'+idx+'" value="'+eveStart+'" placeholder="" onchange="updateShiftTotals()" style="flex:1">' +
        '<span style="align-self:center;color:#94a3b8;font-size:11px">–</span>' +
        '<input class="shift-input" type="time" id="see_'+idx+'" value="'+eveEnd+'" placeholder="" onchange="updateShiftTotals()" style="flex:1">' +
      '</div>' +
    '</div>' +
    '<div class="shift-hrs" id="shrs_'+idx+'">—</div>' +
    '<button class="shift-del" onclick="removeShiftRow('+idx+')" title="Remove">✕</button>';

  container.appendChild(div);
  updateRowHours(idx);
}

function addShiftRow() {
  var existing = document.getElementById('shiftRows').querySelectorAll('.shift-row').length;
  appendShiftRow(makeDefaultShift(_shiftEventKey), existing);
  updateShiftTotals();
}

function removeShiftRow(idx) {
  var row = document.getElementById('srow_' + idx);
  if (row) row.remove();
  updateShiftTotals();
}

function calcHoursFromTimes(start, end) {
  if (!start || !end) return 0;
  var s = start.split(':').map(Number);
  var e = end.split(':').map(Number);
  var sm = s[0]*60 + s[1];
  var em = e[0]*60 + e[1];
  if (em <= sm) em += 24*60; // overnight
  return Math.round((em - sm) / 60 * 10) / 10;
}

function updateRowHours(idx) {
  var ds = document.getElementById('sds_'+idx);
  var de = document.getElementById('sde_'+idx);
  var es = document.getElementById('ses_'+idx);
  var ee = document.getElementById('see_'+idx);
  if (!ds) return 0;
  var h = calcHoursFromTimes(ds.value, de.value) + calcHoursFromTimes(es.value, ee.value);
  var el = document.getElementById('shrs_'+idx);
  if (el) el.textContent = h > 0 ? h + 'h' : '—';
  return h;
}

function updateShiftTotals() {
  var rows = document.getElementById('shiftRows').querySelectorAll('.shift-row');
  var total = 0;
  rows.forEach(function(row) {
    var idx = row.id.replace('srow_','');
    total += updateRowHours(parseInt(idx));
  });
  var rate = parseFloat(document.getElementById('shiftRate').value) || 0;
  document.getElementById('shiftTotalHrs').textContent = total + 'h';
  document.getElementById('shiftTotalPay').textContent = '£' + Math.round(total * rate * 100) / 100;
}

function closeShiftForm() {
  document.getElementById('shiftForm').classList.remove('open');
  _shiftPersonId = null;
  _shiftAssignIdx = null;
}

async function saveShifts() {
  var rows = document.getElementById('shiftRows').querySelectorAll('.shift-row');
  var shifts = [];

  rows.forEach(function(row) {
    var idx  = row.id.replace('srow_','');
    var date = document.getElementById('sd_'+idx).value;
    var ds   = document.getElementById('sds_'+idx).value;
    var de   = document.getElementById('sde_'+idx).value;
    var es   = document.getElementById('ses_'+idx).value;
    var ee   = document.getElementById('see_'+idx).value;

    var shift = { date: date };
    if (ds || de) shift.day = { start: ds, end: de };
    if (es || ee) shift.eve = { start: es, end: ee };
    if (date || ds || es) shifts.push(shift);
  });

  assignments[_shiftAssignIdx].shifts = shifts;
  assignments[_shiftAssignIdx].rate   = parseFloat(document.getElementById('shiftRate').value) || 0;

  try {
    await _db.collection('staff').doc('assignments').set({ list: assignments });
  } catch(e) { console.warn('Save failed', e); }

  closeShiftForm();
  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

<!-- Shift Editor -->
<div class="form-overlay" id="shiftForm">
  <div class="form-box" style="width:520px">
    <h3 id="shiftFormTitle">Edit shifts</h3>
    <p id="shiftFormSub" style="font-size:12px;color:#64748b;margin-bottom:16px"></p>
    
    <div id="shiftRows" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"></div>
    
    <button onclick="addShiftRow()" style="font-size:12px;color:#3b82f6;background:none;border:1px dashed #93c5fd;border-radius:6px;padding:6px 14px;cursor:pointer;width:100%">+ Add day</button>
    
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid #e5e7eb;display:flex;gap:8px;align-items:center">
      <div style="flex:1;font-size:11px;color:#64748b">
        Rate: £<input id="shiftRate" type="number" step="0.5" style="width:60px;padding:3px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:11px"> /hr
        &nbsp;·&nbsp; <span id="shiftTotalHrs" style="font-weight:600;color:#1e293b">0h</span> total
        &nbsp;·&nbsp; <span id="shiftTotalPay" style="font-weight:600;color:#15803d">£0</span>
      </div>
      <button class="btn-cancel" onclick="closeShiftForm()">Cancel</button>
      <button class="btn-save" onclick="saveShifts()">Save shifts</button>
    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Staff</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f1f5f9;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#1e293b;padding:0 16px;height:44px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#topbar h1{color:#fff;font-size:14px;font-weight:700}
.tb-btn{padding:5px 12px;border-radius:6px;border:1px solid #334155;background:none;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer}
.tb-btn.active{background:#FF4B7B;border-color:#FF4B7B;color:#fff}
.tb-btn-primary{background:#FF4B7B;border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.tb-sep{width:1px;height:20px;background:#334155;margin:0 4px}
#toolbar{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;align-items:center;flex-wrap:wrap}
#toolbar select,#toolbar input{padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:11px;font-family:inherit;outline:none;background:#fff}
#content{flex:1;overflow-y:auto;padding:16px}
#statusbar{background:#0f172a;height:22px;display:flex;align-items:center;padding:0 12px;flex-shrink:0}
#statusbar span{font-size:10px;color:#334155}

/* Person cards */
.section-header{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#64748b;padding:16px 0 6px;border-bottom:1px solid #e2e8f0;margin-bottom:8px}
.person-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:8px;overflow:hidden}
.pc-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.pc-avatar{width:34px;height:34px;border-radius:50%;background:#22224C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.pc-name{font-size:13px;font-weight:600;color:#1e293b}
.pc-meta{font-size:11px;color:#64748b;margin-top:1px}
.pc-badges{display:flex;gap:4px;margin-left:auto;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.badge-bar{background:#dbeafe;color:#1d4ed8}
.badge-crew{background:#f3e8ff;color:#6d28d9}
.badge-plh{background:#dcfce7;color:#166534}
.badge-confirmed{background:#dcfce7;color:#166534}
.badge-pending{background:#fef9c3;color:#854d0e}
.badge-risk{background:#fee2e2;color:#dc2626}
.badge-last{background:#f1f5f9;color:#64748b}
.pc-chevron{color:#94a3b8;font-size:14px;transition:transform .2s;flex-shrink:0}
.pc-chevron.open{transform:rotate(180deg)}

.pc-body{display:none;padding:0 14px 12px;border-top:1px solid #f1f5f9}
.pc-body.open{display:block}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.pc-field{font-size:11px}
.pc-field label{display:block;color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.05em;margin-bottom:2px}
.pc-field span{color:#374151}
.pc-divider{grid-column:1/-1;border-top:1px solid #f1f5f9;margin:4px 0}
.pc-history{grid-column:1/-1}
.event-chip{display:inline-block;background:#f1f5f9;color:#64748b;font-size:10px;padding:2px 7px;border-radius:10px;margin:2px}
.event-chip.current{background:#dbeafe;color:#1d4ed8}

/* Assignment section in card */
.pc-assignment{grid-column:1/-1;background:#f8fafc;border-radius:6px;padding:8px 10px;margin-top:4px}
.pc-assignment-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.assign-ref{font-size:10px;color:#94a3b8;font-style:italic}
.shift-pill{display:inline-block;background:#fff;border:1px solid #e2e8f0;border-radius:4px;padding:2px 6px;font-size:10px;color:#374151;margin:2px}

/* Add/Edit form overlay */
.overlay{position:fixed;inset:0;background:#0006;z-index:50;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.panel{background:#fff;border-radius:12px;width:560px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px #0003}
.panel-header{padding:14px 18px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.panel-header h3{font-size:14px;font-weight:700}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px}
.panel-footer{padding:12px 18px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:#FF4B7B}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.section-label{font-size:11px;font-weight:700;color:#22224C;text-transform:uppercase;letter-spacing:.06em;padding:10px 0 6px;border-bottom:1px solid #e5e7eb;margin-bottom:10px}
.btn-primary{padding:7px 18px;background:#FF4B7B;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-secondary{padding:7px 14px;background:#f1f5f9;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.btn-danger{padding:7px 14px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;font-size:12px;cursor:pointer}

/* Assign to event panel */
.assign-panel{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:12px}
.assign-panel-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px}
.shift-row{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:6px}
.shift-row input{padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;font-family:inherit;outline:none;width:100%}
.shift-row .shift-del{background:none;border:none;cursor:pointer;color:#ef4444;font-size:14px;padding:4px}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
</style>
</head>
<body>

<div id="topbar">
  <h1>FD Staff</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn active" onclick="setView('roles',this)">Staff Planner</button>
  <button class="tb-btn" onclick="setView('people',this)">People</button>
  <button class="tb-btn" onclick="setView('wristbands',this)">Wristbands & T-Shirts</button>
  <div style="margin-left:auto;display:flex;gap:8px">
    <button class="tb-btn-primary" onclick="openAddPerson()">+ Add person</button>
    <button class="tb-btn" onclick="openAssignEvent()" id="assignBtn" style="display:none">+ Assign to FD7</button>
  </div>
</div>

<div id="toolbar">
  <input type="text" id="searchBox" placeholder="Search name..." oninput="render()" style="width:180px">
  <select id="sectionFilter" onchange="render()">
    <option value="">All sections</option>
    <option value="Bar">Bar</option>
    <option value="Crew">Crew</option>
  </select>
  <select id="plhFilter" onchange="render()">
    <option value="">All staff</option>
    <option value="yes">PLH holders only</option>
  </select>
  <select id="eventFilter" onchange="render()">
    <option value="">All events</option>
    <option value="FD7">FD7 only</option>
    
  </select>
  <span id="countLabel" style="font-size:11px;color:#94a3b8;margin-left:auto"></span>
</div>

<div id="content"></div>
<div id="statusbar"><span>FD Staff · v2.6.0</span></div>

<!-- Add/Edit person overlay -->
<div class="overlay" id="personOverlay" onclick="if(event.target===this)closePersonForm()">
  <div class="panel">
    <div class="panel-header">
      <h3 id="formTitle">Add person</h3>
      <button onclick="closePersonForm()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:20px">&#215;</button>
    </div>
    <div class="panel-body">
      <div class="section-label">Personal details</div>
      <div class="field-row">
        <div class="field"><label>First name *</label><input id="fFirst" type="text"></div>
        <div class="field"><label>Last name</label><input id="fLast" type="text"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Email</label><input id="fEmail" type="email"></div>
        <div class="field"><label>Phone</label><input id="fPhone" type="text"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Emergency contact</label><input id="fEmContact" type="text"></div>
        <div class="field"><label>Emergency phone</label><input id="fEmPhone" type="text"></div>
      </div>
      <div class="field"><label>Health / dietary notes</label><input id="fHealth" type="text" placeholder="Allergies, medical conditions etc"></div>
      <div class="field"><label>Car reg</label><input id="fCarReg" type="text"></div>

      <div class="section-label">Section & role</div>
      <div class="field-row">
        <div class="field"><label>Section *</label>
          <select id="fSection">
            <option value="Bar">Bar</option>
            <option value="Crew">Crew</option>
          </select>
        </div>
        <div class="field"><label>Status</label>
          <select id="fStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="section-label">Uniform</div>
      <div class="field-row">
        <div class="field"><label>T-shirt size</label>
          <select id="fTshirt">
            <option value="">Unknown</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
          </select>
        </div>
        <div class="field"><label>Neck shape</label>
          <select id="fNeck">
            <option value="">Unknown</option>
            <option value="Round">Round</option>
            <option value="V">V-neck</option>
          </select>
        </div>
      </div>

      <div class="section-label">Personal Licence Holder</div>
      <div class="field-row">
        <div class="field"><label>PLH?</label>
          <select id="fPlh">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
        <div class="field"><label>PLH certificate number</label><input id="fPlhNum" type="text" placeholder="e.g. PLH/2023/12345"></div>
      </div>

      <div class="section-label">Event history</div>
      <div class="field"><label>Events worked (comma separated)</label><input id="fHistory" type="text" placeholder="e.g. HRR26, FD25, Shindig25"></div>
    </div>
    <div class="panel-footer">
      <button class="btn-danger" id="deleteBtn" onclick="deletePerson()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn-secondary" onclick="closePersonForm()">Cancel</button>
      <button class="btn-primary" onclick="savePerson()">Save</button>
    </div>
  </div>
</div>

<!-- Assign to event overlay -->
<div class="overlay" id="assignOverlay" onclick="if(event.target===this)closeAssignForm()">
  <div class="panel">
    <div class="panel-header">
      <h3 id="assignTitle">Assign to FD7</h3>
      <button onclick="closeAssignForm()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:20px">&#215;</button>
    </div>
    <div class="panel-body">
      <div class="field">
        <label>Person *</label>
        <select id="aPersonId"></select>
      </div>
      <div class="assign-panel" id="aPrevRef" style="display:none">
        <div class="assign-panel-title">Reference from last event <span id="aPrevEvent" style="color:#64748b;font-weight:400"></span></div>
        <div id="aPrevDetail" style="font-size:11px;color:#64748b"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Role</label><input id="aRole" type="text" placeholder="e.g. Bar Staff, Bar Manager"></div>
        <div class="field"><label>Rate (£/hr)</label><input id="aRate" type="number" step="0.5" placeholder="0"></div>
      </div>
      <div class="field"><label>Confirmed?</label>
        <select id="aConfirmed">
          <option value="no">Pending</option>
          <option value="yes">Confirmed</option>
        </select>
      </div>
      <div class="section-label">Shifts for FD7 (Sat 15 Aug 2026)</div>
      <div id="shiftRows"></div>
      <button onclick="addShiftRow()" style="padding:5px 12px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;cursor:pointer;margin-top:4px">+ Add shift</button>
      <div class="field" style="margin-top:12px"><label>Notes</label><textarea id="aNotes" style="min-height:50px"></textarea></div>
    </div>
    <div class="panel-footer">
      <button class="btn-danger" id="aDeleteBtn" onclick="deleteAssignment()" style="display:none;margin-right:auto">Remove from event</button>
      <button class="btn-secondary" onclick="closeAssignForm()">Cancel</button>
      <button class="btn-primary" onclick="saveAssignment()">Save assignment</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="config.js"></script>
<script src="fd-rules.js"></script>
<script>
window._fbUser = window._fbUser || {email:'local'};


// ── Roles & Headcount ─────────────────────────────────────────────────────────
var ROLE_DEFS = [
  {section:'Front Bar',sectionColor:'#0369a1',sectionBg:'#dbeafe',roles:[
    {id:'bar_manager',     name:'Bar Manager',             fixed:true, fixedQty:1,    ratio:null, ratioDesc:'1 per event — fixed',                                    plhRequired:true},
    {id:'front_bar_staff', name:'Bar Staff',               fixed:false,fixedQty:null, ratio:100,  ratioDesc:'1 per 100 guests at peak (Purple Guide)',                plhRequired:false},
  ]},
  {section:'Back Bar',sectionColor:'#0f766e',sectionBg:'#d1fae5',roles:[
    {id:'back_bar_manager',name:'Back Bar Manager',        fixed:true, fixedQty:1,    ratio:null, ratioDesc:'1 per event — fixed',                                    plhRequired:false},
    {id:'back_bar_stocker',name:'Back Bar Stocker',        fixed:false,fixedQty:null, ratio:null, ratioDesc:'1 per 3-4 front bar staff',                             plhRequired:false},
  ]},
  {section:'Cleaning',sectionColor:'#7c3aed',sectionBg:'#ede9fe',roles:[
    {id:'rubbish_cleaner', name:'Rubbish Cleaner',         fixed:false,fixedQty:null, ratio:300,  ratioDesc:'1 per 300 guests (Purple Guide)',                       plhRequired:false},
    {id:'toilet_attendant',name:'Toilet Attendant',        fixed:false,fixedQty:null, ratio:null, ratioDesc:'1 per 3 toilet units',                                  plhRequired:false},
  ]},
  {section:'Entrance',sectionColor:'#b45309',sectionBg:'#fef3c7',roles:[
    {id:'door_main',       name:'Door Staff — Main Entrance', fixed:true,fixedQty:3, ratio:null, ratioDesc:'3 fixed — number of entrance lanes',                     plhRequired:false},
    {id:'door_dj',         name:'Door Staff — DJ/Artist Entrance', fixed:true,fixedQty:1, ratio:null, ratioDesc:'1 fixed — artist entrance',                        plhRequired:false},
  ]},
  {section:'Setup & Takedown',sectionColor:'#374151',sectionBg:'#f1f5f9',roles:[
    {id:'setup_crew',      name:'Setup Crew',    fixed:false,fixedQty:null, ratio:null, ratioDesc:'~1 per 100 guests (1,500=8 / 2,000=12 / 2,500=16)',              plhRequired:false},
    {id:'takedown_crew',   name:'Takedown Crew', fixed:false,fixedQty:null, ratio:null, ratioDesc:'1,500=6 / 2,000=8 / 2,500=10',                                  plhRequired:false},
  ]},
];

var TOILET_UNITS = {1500:5, 2000:7, 2500:8};
var roleOverrides = {};

function calcRoleQty(role, guests) {
  if (role.fixed) return role.fixedQty;
  if (role.ratio) return Math.ceil(guests / role.ratio);
  if (role.id === 'back_bar_stocker') return Math.ceil(Math.ceil(guests/100) / 3.5);
  if (role.id === 'toilet_attendant') return Math.ceil((TOILET_UNITS[guests]||6) / 3);
  if (role.id === 'setup_crew')    return guests === 1500 ? 8 : guests === 2000 ? 12 : 16;
  if (role.id === 'takedown_crew') return guests === 1500 ? 6 : guests === 2000 ? 8  : 10;
  return 0;
}

function saveRoleOverrides() {
  _db.collection('staff').doc('role_overrides_fd7').set({overrides:roleOverrides}).catch(function(e){console.warn(e);});
}

async function loadRoleOverrides() {
  try {
    var snap = await _db.collection('staff').doc('role_overrides_fd7').get();
    if (snap.exists && snap.data().overrides) roleOverrides = snap.data().overrides;
  } catch(e) {console.warn(e);}
}

function editRoleOverride(roleId, tier, calcQty) {
  var key = roleId + '_' + tier;
  var current = roleOverrides[key];
  var currentQty = current ? current.qty : calcQty;
  var newQty = prompt('Override headcount for ' + tier.toLocaleString() + ' guests.\nPurple Guide recommendation: ' + calcQty + '\n\nEnter your planned number:', currentQty);
  if (newQty === null) return;
  newQty = parseInt(newQty);
  if (isNaN(newQty) || newQty < 0) { alert('Please enter a valid number'); return; }
  var reason = '';
  if (newQty !== calcQty) {
    reason = prompt('Reason for override (optional):', current ? current.reason : '') || '';
  }
  if (newQty === calcQty && !reason) { delete roleOverrides[key]; }
  else { roleOverrides[key] = {qty:newQty, reason:reason, calcQty:calcQty, updatedAt:new Date().toISOString()}; }
  saveRoleOverrides();
  renderRoles();
  notify(newQty === calcQty ? 'Reverted to recommended' : 'Override saved');
}


// ── Role slots ────────────────────────────────────────────────────────────────
var roleSlots = {};
var selectedTier = 1500;

function saveRoleSlots() {
  _db.collection('staff').doc('role_slots_fd7').set({slots: roleSlots, tier: selectedTier}).catch(function(e){console.warn(e);});
}

async function loadRoleSlots() {
  try {
    var snap = await _db.collection('staff').doc('role_slots_fd7').get();
    if (snap.exists) {
      roleSlots = snap.data().slots || {};
      selectedTier = snap.data().tier || 1500;
    }
  } catch(e) { console.warn(e); }
}

function wristbandForRole(roleId, slotIdx) {
  if (roleId === 'back_bar_manager') return {label:'AAA', color:'#9d174d', bg:'#fce7f3'};
  if (roleId === 'rubbish_cleaner' && slotIdx < 2) return {label:'AAA', color:'#9d174d', bg:'#fce7f3'};
  return {label:'Staff', color:'#1e40af', bg:'#dbeafe'};
}

function setTier(tier) {
  selectedTier = tier;
  saveRoleSlots();
  renderRoles();
}

function updateSlot(roleId, slotIdx, field, value) {
  if (!roleSlots[roleId]) roleSlots[roleId] = [];
  if (!roleSlots[roleId][slotIdx]) roleSlots[roleId][slotIdx] = {personId:'', start:'', end:''};
  roleSlots[roleId][slotIdx][field] = value;
  saveRoleSlots();
  clearTimeout(window._roleRenderTimer);
  window._roleRenderTimer = setTimeout(function(){ renderRoles(); }, 800);
}

function renderRoles() {
  var html = '';

  // Header
  html += '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">';
  html += '<div><div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:3px">FD7 Staffing — Role Assignments</div>';
  html += '<div style="font-size:11px;color:#64748b">Assign staff to each role. Wristband and T-shirt auto-flagged.</div></div>';
  html += '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#64748b;font-weight:600">Capacity:</span>';
  var tiers = [1500, 2000, 2500];
  tiers.forEach(function(t) {
    var active = selectedTier === t;
    html += '<button onclick="setTier(' + t + ')" style="padding:4px 12px;border-radius:16px;border:2px solid ' + (active ? '#FF4B7B' : '#e2e8f0') + ';background:' + (active ? '#FF4B7B' : '#fff') + ';color:' + (active ? '#fff' : '#64748b') + ';font-size:11px;font-weight:700;cursor:pointer">' + t.toLocaleString() + '</button>';
  });
  html += '</div></div>';

  // Legend
  html += '<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';
  html += '<span style="font-size:10px;padding:2px 9px;border-radius:10px;background:#fce7f3;color:#9d174d;font-weight:600">AAA wristband</span>';
  html += '<span style="font-size:10px;padding:2px 9px;border-radius:10px;background:#dbeafe;color:#1e40af;font-weight:600">Staff wristband</span>';
  html += '<span style="font-size:10px;padding:2px 9px;border-radius:10px;background:#fef9c3;color:#854d0e;font-weight:600">👕 T-shirt missing</span>';
  html += '<span style="font-size:10px;padding:2px 9px;border-radius:10px;background:#fee2e2;color:#dc2626;font-weight:600">🔒 Not PLH</span>';
  html += '</div>';

  var totalAAA = 0, totalStaff = 0, totalUnassigned = 0, totalMissingTshirt = 0;

  ROLE_DEFS.forEach(function(section) {
    html += '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:10px;overflow:hidden">';
    html += '<div style="background:' + section.sectionBg + ';padding:9px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:' + section.sectionColor + '">' + section.section + '</div>';

    section.roles.forEach(function(role) {
      var count = calcRoleQty(role, selectedTier);
      if (!roleSlots[role.id]) roleSlots[role.id] = [];
      while (roleSlots[role.id].length < count) roleSlots[role.id].push({personId:'', start:'', end:''});

      html += '<div style="border-top:1px solid #f1f5f9;padding:10px 14px">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">';
      html += '<span style="font-size:12px;font-weight:700;color:#1e293b">' + role.name + '</span>';
      html += '<span style="font-size:10px;color:#94a3b8;background:#f1f5f9;padding:1px 7px;border-radius:8px">' + count + ' slots</span>';
      if (role.plhRequired) html += '<span style="font-size:10px;background:#fee2e2;color:#dc2626;padding:1px 7px;border-radius:8px;font-weight:600">🔒 PLH required</span>';
      html += '</div>';

      for (var idx = 0; idx < count; idx++) {
        var slot = roleSlots[role.id][idx] || {personId:'', start:'', end:''};
        var wb = wristbandForRole(role.id, idx);
        var person = slot.personId ? people.find(function(p){ return p.id === slot.personId; }) : null;
        var tshirtMissing = person && !person.tshirt;
        var notPLH = role.plhRequired && person && person.plh !== 'yes';
        var borderColor = notPLH ? '#fca5a5' : tshirtMissing ? '#fcd34d' : '#e2e8f0';

        if (wb.label === 'AAA') totalAAA++; else totalStaff++;
        if (!slot.personId) totalUnassigned++;
        else if (tshirtMissing) totalMissingTshirt++;

        html += '<div style="display:grid;grid-template-columns:1fr 80px 80px 70px 28px;gap:5px;align-items:center;margin-bottom:4px;padding:5px 8px;background:#f8fafc;border-radius:5px;border:1px solid ' + borderColor + '">';

        // Person select — use data attributes to avoid quote issues
        html += '<select data-role="' + role.id + '" data-idx="' + idx + '" data-field="personId" onchange="handleSlotChange(this)" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:#fff">';
        html += '<option value="">— Unassigned —</option>';
        people.filter(function(p){ return p.status !== 'inactive'; })
          .sort(function(a,b){ return (a.firstName+' '+a.lastName).localeCompare(b.firstName+' '+b.lastName); })
          .forEach(function(p) {
            var label = p.firstName + ' ' + (p.lastName||'');
            if (role.plhRequired && p.plh !== 'yes') label += ' ✗PLH';
            html += '<option value="' + p.id + '"' + (slot.personId === p.id ? ' selected' : '') + '>' + label + '</option>';
          });
        html += '</select>';

        html += '<input type="time" value="' + (slot.start||'') + '" data-role="' + role.id + '" data-idx="' + idx + '" data-field="start" onchange="handleSlotChange(this)" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;font-family:inherit;outline:none">';
        html += '<input type="time" value="' + (slot.end||'') + '" data-role="' + role.id + '" data-idx="' + idx + '" data-field="end" onchange="handleSlotChange(this)" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;font-family:inherit;outline:none">';
        html += '<span style="font-size:9px;padding:2px 5px;border-radius:8px;background:' + wb.bg + ';color:' + wb.color + ';font-weight:700;text-align:center">' + wb.label + '</span>';

        var flags = (tshirtMissing ? '👕' : '') + (notPLH ? '🔒' : '');
        html += '<span style="font-size:12px;text-align:center">' + (flags||'') + '</span>';
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });

  // Summary bar
  html += '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px 16px;display:flex;gap:20px;flex-wrap:wrap;align-items:center">';
  html += '<div><div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600">AAA wristbands</div><div style="font-size:18px;font-weight:800;color:#9d174d">' + totalAAA + '</div></div>';
  html += '<div><div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600">Staff wristbands</div><div style="font-size:18px;font-weight:800;color:#1e40af">' + totalStaff + '</div></div>';
  html += '<div><div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600">Unassigned</div><div style="font-size:18px;font-weight:800;color:' + (totalUnassigned ? '#dc2626' : '#15803d') + '">' + totalUnassigned + '</div></div>';
  if (totalMissingTshirt) html += '<div><div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600">Missing T-shirt</div><div style="font-size:18px;font-weight:800;color:#854d0e">' + totalMissingTshirt + '</div></div>';

  // PLH holders
  var plhPeople = people.filter(function(p){ return p.plh==='yes' && p.status!=='inactive'; });
  html += '<div style="margin-left:auto"><div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600;margin-bottom:4px">PLH Holders</div>';
  if (plhPeople.length) {
    plhPeople.forEach(function(p){ html += '<span style="display:inline-block;background:#dcfce7;color:#166534;font-size:11px;padding:2px 8px;border-radius:10px;margin:1px;font-weight:600">' + (p.firstName+' '+(p.lastName||'')).trim() + '</span>'; });
  } else {
    html += '<span style="color:#dc2626;font-size:11px">⚠ None in database</span>';
  }
  html += '</div></div>';

  document.getElementById('content').innerHTML = html;
}

function handleSlotChange(el) {
  var roleId = el.getAttribute('data-role');
  var idx = parseInt(el.getAttribute('data-idx'));
  var field = el.getAttribute('data-field');
  updateSlot(roleId, idx, field, el.value);
}

var wristbandData = {
  ticketActuals: 1500,
  ticketTarget: 2500,
  buffer: 10  // percent
};

async function loadWristbandData() {
  try {
    var snap = await _db.collection('staff').doc('wristband_data_fd7').get();
    if (snap.exists) wristbandData = Object.assign({}, wristbandData, snap.data());
  } catch(e) { console.warn(e); }
}

function saveWristbandData() {
  _db.collection('staff').doc('wristband_data_fd7').set(wristbandData).catch(function(e){console.warn(e);});
}

function getStaffWristbandCount() {
  // Count all filled non-AAA slots from roleSlots at selectedTier
  var count = 0;
  ROLE_DEFS.forEach(function(section) {
    section.roles.forEach(function(role) {
      var slotCount = calcRoleQty(role, selectedTier);
      var slots = roleSlots[role.id] || [];
      for (var i = 0; i < slotCount; i++) {
        var slot = slots[i] || {};
        if (slot.personId) {
          var wb = wristbandForRole(role.id, i);
          if (wb.label === 'Staff') count++;
        }
      }
    });
  });
  return count;
}

function updateContractor(el) {
  var key = el.getAttribute('data-ctkey');
  if (!wristbandData.contractors) wristbandData.contractors = {};
  wristbandData.contractors[key] = parseInt(el.value)||0;
  saveWristbandData();
  // Update total without full re-render
  var total = 0;
  Object.keys(wristbandData.contractors).forEach(function(k){ total += wristbandData.contractors[k]||0; });
}

function getAAAWristbandCount() {
  var artistCount = 0;
  if (window._artistData && window._artistData.length) {
    artistCount = window._artistData.filter(function(a){ return a.events && a.events.includes('FD7'); }).length;
  }
  if (wristbandData.artistCount) artistCount = wristbandData.artistCount;
  var namedCrew = wristbandData.namedCrewCount || 5;
  var guestsPerArtist = wristbandData.guestsPerArtist || 2;
  var fullAAA = artistCount + namedCrew;
  var artistGuests = artistCount * guestsPerArtist;
  var roleAAA = 0;
  ROLE_DEFS.forEach(function(section) {
    section.roles.forEach(function(role) {
      var slotCount = calcRoleQty(role, selectedTier);
      for (var i = 0; i < slotCount; i++) {
        if (wristbandForRole(role.id, i).label === 'AAA') roleAAA++;
      }
    });
  });
  return {fullAAA:fullAAA, artistGuests:artistGuests, roleAAA:roleAAA, total:fullAAA+artistGuests+roleAAA, artistCount:artistCount, namedCrew:namedCrew, guestsPerArtist:guestsPerArtist};
}

async function loadArtistData() {
  try {
    var snap = await _db.collection('artists_db').doc('artists').get();
    if (snap.exists && snap.data().artists) window._artistData = snap.data().artists;
  } catch(e) { console.warn('Artist data load failed', e); }
}

function getTshirtCounts() {
  var sizes = {XS:0, S:0, M:0, L:0, XL:0, XXL:0, missing:0};
  var assigned = new Set();
  ROLE_DEFS.forEach(function(section) {
    section.roles.forEach(function(role) {
      var slotCount = calcRoleQty(role, selectedTier);
      var slots = roleSlots[role.id] || [];
      for (var i = 0; i < slotCount; i++) {
        var slot = slots[i] || {};
        if (slot.personId && !assigned.has(slot.personId)) {
          assigned.add(slot.personId);
          var p = people.find(function(p2){ return p2.id === slot.personId; });
          if (p) {
            if (p.tshirt && sizes[p.tshirt] !== undefined) sizes[p.tshirt]++;
            else sizes.missing++;
          }
        }
      }
    });
  });
  return sizes;
}

var SEED_ASSIGNMENTS = [];

// ── Render ────────────────────────────────────────────────────────────────────
function setView(v, el) {
  _currentView = v;
  document.querySelectorAll('.tb-btn').forEach(function(b){b.classList.remove('active');});
  if(el) el.classList.add('active');
  document.getElementById('assignBtn').style.display = 'none';
  if (v === 'roles') { setTimeout(renderRoles, 50); return; }
  if (v === 'wristbands') { setTimeout(renderWristbands, 50); return; }
  render();
}

function render() {
  if (_currentView === 'people') renderPeople();
  else if (_currentView === 'roles') renderRoles();
  else if (_currentView === 'wristbands') renderWristbands();
}

function personName(p) { return (p.firstName + ' ' + (p.lastName||'')).trim(); }

function initials(p) {
  var n = personName(p);
  return n.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);
}

function renderPeople() {
  var q = (document.getElementById('searchBox').value||'').toLowerCase();
  var sec = document.getElementById('sectionFilter').value;
  var plh = document.getElementById('plhFilter').value;
  var evtFilter = document.getElementById('eventFilter').value;

  var filtered = people.filter(function(p) {
    if (sec && p.section !== sec) return false;
    if (plh === 'yes' && p.plh !== 'yes') return false;
    if (evtFilter && !(p.history||[]).includes(evtFilter)) return false;
    if (q && !personName(p).toLowerCase().includes(q) && !(p.email||'').toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('countLabel').textContent = filtered.length + ' people';

  // Group by section
  var sections = {};
  filtered.forEach(function(p) {
    if (!sections[p.section]) sections[p.section] = [];
    sections[p.section].push(p);
  });

  var html = '';
  Object.keys(sections).sort().forEach(function(sec) {
    html += '<div class="section-header">' + sec + ' (' + sections[sec].length + ')</div>';
    sections[sec].forEach(function(p) {
      var myAssigns = assignments.filter(function(a){ return a.personId === p.id && a.event === CURRENT_EVENT; });
      var assign = myAssigns[0];
      var lastEvent = (p.history||[]).slice(-1)[0] || '';

      html += '<div class="person-card">';
      html += '<div class="pc-header" onclick="toggleCard(\'' + p.id + '\')">';
      html += '<div class="pc-avatar">' + initials(p) + '</div>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div class="pc-name">' + personName(p) + '</div>';
      html += '<div class="pc-meta">' + (assign ? assign.role : 'Not assigned to FD7') + (p.email ? ' · ' + p.email : '') + '</div>';
      html += '</div>';
      html += '<div class="pc-badges">';
      html += '<span class="badge badge-' + p.section.toLowerCase() + '">' + p.section + '</span>';
      if (p.plh === 'yes') html += '<span class="badge badge-plh">PLH</span>';
      if (assign) html += '<span class="badge badge-' + (assign.confirmed==='yes'?'confirmed':'pending') + '">' + (assign.confirmed==='yes'?'FD7 ✓':'FD7 pending') + '</span>';
      if (lastEvent) html += '<span class="badge badge-last">Last: ' + lastEvent + '</span>';
      html += '</div>';
      html += '<span class="pc-chevron" id="chev_' + p.id + '">▾</span>';
      html += '</div>'; // pc-header

      html += '<div class="pc-body" id="body_' + p.id + '">';
      html += '<div class="pc-grid">';
      if (p.email) html += '<div class="pc-field"><label>Email</label><span>' + p.email + '</span></div>';
      if (p.phone) html += '<div class="pc-field"><label>Phone</label><span>' + p.phone + '</span></div>';
      if (p.emContact) html += '<div class="pc-field"><label>Emergency contact</label><span>' + p.emContact + '</span></div>';
      if (p.emPhone) html += '<div class="pc-field"><label>Emergency phone</label><span>' + p.emPhone + '</span></div>';
      if (p.health) html += '<div class="pc-field"><label>Health notes</label><span>' + p.health + '</span></div>';
      if (p.carReg) html += '<div class="pc-field"><label>Car reg</label><span>' + p.carReg + '</span></div>';
      if (p.tshirt) html += '<div class="pc-field"><label>T-shirt</label><span>' + p.tshirt + (p.neck?' · '+p.neck:'') + '</span></div>';
      if (p.plh==='yes') html += '<div class="pc-field"><label>PLH cert</label><span>' + (p.plhNum||'Number not recorded') + '</span></div>';

      // Event history
      if ((p.history||[]).length) {
        html += '<div class="pc-history"><label style="display:block;font-size:9px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Event history</label>';
        p.history.forEach(function(ev){
          html += '<span class="event-chip' + (ev===CURRENT_EVENT?' current':'') + '">' + ev + '</span>';
        });
        html += '</div>';
      }

      // FD7 assignment
      if (assign) {
        html += '<div class="pc-divider"></div>';
        html += '<div class="pc-assignment">';
        html += '<div class="pc-assignment-title">FD7 2026 Assignment <button onclick="openEditAssign(\'' + p.id + '\')" style="background:#f1f5f9;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;color:#374151">Edit</button></div>';
        html += '<div style="font-size:11px;color:#374151;margin-bottom:4px"><strong>' + assign.role + '</strong>';
        if (assign.rate) html += ' · £' + assign.rate + '/hr';
        html += '</div>';
        if (assign.shifts && assign.shifts.length) {
          assign.shifts.forEach(function(s){
            html += '<span class="shift-pill">' + (s.date?s.date+' ':'') + s.start + '–' + s.end + '</span>';
          });
        }
        if (assign.notes) html += '<div style="font-size:10px;color:#64748b;margin-top:4px">' + assign.notes + '</div>';
        html += '</div>';
      } else {
        html += '<div class="pc-divider"></div>';
        html += '<div style="font-size:11px;color:#94a3b8;padding:6px 0">Not assigned to FD7. <a href="#" onclick="openAssignPerson(\'' + p.id + '\');return false" style="color:#FF4B7B">Assign →</a></div>';
      }

      html += '</div>'; // pc-grid
      html += '</div>'; // pc-body
      html += '</div>'; // person-card
    });
  });

  if (!html) html = '<div style="padding:24px;color:#94a3b8;text-align:center">No staff found</div>';

  // PLH warning
  var fd7Assigns = assignments.filter(function(a){ return a.event === CURRENT_EVENT; }); // uses CURRENT_EVENT
  var plhOnDuty = fd7Assigns.some(function(a){
    var p = people.find(function(p2){return p2.id===a.personId;});
    return p && p.plh === 'yes' && a.confirmed === 'yes';
  });
  if (!plhOnDuty && fd7Assigns.length) {
    html = '<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#dc2626;font-weight:600">⚠ No confirmed PLH on duty for FD7. At least one Personal Licence Holder must be present.</div>' + html;
  }

  document.getElementById('content').innerHTML = html;
}

function renderAssignments() {
  var fd7 = assignments.filter(function(a){ return a.event === CURRENT_EVENT; });
  document.getElementById('countLabel').textContent = fd7.length + ' assigned to FD7';

  var html = '<div class="section-header">FD7 — Sat 15 Aug 2026 · Ashfields Carriage & Polo Club</div>';
  if (!fd7.length) {
    html += '<div style="padding:24px;color:#94a3b8;text-align:center">No assignments yet. Add staff from the People view.</div>';
  } else {
    fd7.forEach(function(a) {
      var p = people.find(function(p2){return p2.id===a.personId;});
      if (!p) return;
      html += '<div class="person-card">';
      html += '<div class="pc-header">';
      html += '<div class="pc-avatar">' + initials(p) + '</div>';
      html += '<div style="flex:1">';
      html += '<div class="pc-name">' + personName(p) + '</div>';
      html += '<div class="pc-meta">' + a.role + (a.rate?' · £'+a.rate+'/hr':'') + '</div>';
      if (a.shifts && a.shifts.length) {
        html += '<div style="margin-top:4px">';
        a.shifts.forEach(function(s){ html += '<span class="shift-pill">' + s.start + '–' + s.end + '</span>'; });
        html += '</div>';
      }
      html += '</div>';
      html += '<div class="pc-badges">';
      html += '<span class="badge badge-' + (a.confirmed==='yes'?'confirmed':'pending') + '">' + (a.confirmed==='yes'?'Confirmed':'Pending') + '</span>';
      if (p.plh==='yes') html += '<span class="badge badge-plh">PLH</span>';
      html += '</div>';
      html += '<button onclick="openEditAssign(\'' + p.id + '\')" style="margin-left:8px;padding:4px 10px;background:#f1f5f9;border:none;border-radius:5px;font-size:11px;cursor:pointer">Edit</button>';
      html += '</div>';
      html += '</div>';
    });
  }
  document.getElementById('content').innerHTML = html;
}

function toggleCard(id) {
  var body = document.getElementById('body_' + id);
  var chev = document.getElementById('chev_' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function openEditPerson(id, e) {
  if (e) e.stopPropagation();
  var p = people.find(function(p2){return p2.id===id;});
  if (!p) return;
  _editingPersonId = id;
  document.getElementById('formTitle').textContent = 'Edit — ' + personName(p);
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('fFirst').value = p.firstName||'';
  document.getElementById('fLast').value = p.lastName||'';
  document.getElementById('fEmail').value = p.email||'';
  document.getElementById('fPhone').value = p.phone||'';
  document.getElementById('fEmContact').value = p.emContact||'';
  document.getElementById('fEmPhone').value = p.emPhone||'';
  document.getElementById('fHealth').value = p.health||'';
  document.getElementById('fCarReg').value = p.carReg||'';
  document.getElementById('fSection').value = p.section||'Bar';
  document.getElementById('fStatus').value = p.status||'active';
  document.getElementById('fTshirt').value = p.tshirt||'';
  document.getElementById('fNeck').value = p.neck||'';
  document.getElementById('fPlh').value = p.plh||'no';
  document.getElementById('fPlhNum').value = p.plhNum||'';
  document.getElementById('fHistory').value = (p.history||[]).join(', ');
  document.getElementById('personOverlay').classList.add('open');
}

function closePersonForm() {
  document.getElementById('personOverlay').classList.remove('open');
}

function savePerson() {
  var first = document.getElementById('fFirst').value.trim();
  if (!first) { alert('First name is required'); return; }

  var history = document.getElementById('fHistory').value.split(',').map(function(s){return s.trim();}).filter(Boolean);

  var personData = {
    firstName: first,
    lastName: document.getElementById('fLast').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    emContact: document.getElementById('fEmContact').value.trim(),
    emPhone: document.getElementById('fEmPhone').value.trim(),
    health: document.getElementById('fHealth').value.trim(),
    carReg: document.getElementById('fCarReg').value.trim(),
    section: document.getElementById('fSection').value,
    status: document.getElementById('fStatus').value,
    tshirt: document.getElementById('fTshirt').value,
    neck: document.getElementById('fNeck').value,
    plh: document.getElementById('fPlh').value,
    plhNum: document.getElementById('fPlhNum').value.trim(),
    history: history,
  };

  if (_editingPersonId) {
    var idx = people.findIndex(function(p){return p.id===_editingPersonId;});
    if (idx >= 0) { personData.id = _editingPersonId; people[idx] = personData; }
  } else {
    personData.id = (first + '_' + (personData.lastName||'')).toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + Date.now();
    people.push(personData);
  }

  savePeople();
  render();
  closePersonForm();
  notify('Saved — ' + first);
}

function deletePerson() {
  if (!_editingPersonId) return;
  var p = people.find(function(p2){return p2.id===_editingPersonId;});
  if (!confirm('Delete ' + (p?personName(p):'this person') + '?')) return;
  people = people.filter(function(p2){return p2.id!==_editingPersonId;});
  savePeople();
  render();
  closePersonForm();
  notify('Deleted');
}

// ── Assign to event ───────────────────────────────────────────────────────────
function openAssignEvent() {
  openAssignPerson(null);
}

function openAssignPerson(personId) {
  _editingAssignId = null;
  document.getElementById('assignTitle').textContent = 'Assign to FD7';
  document.getElementById('aDeleteBtn').style.display = 'none';

  // Populate person dropdown
  var sel = document.getElementById('aPersonId');
  sel.innerHTML = '';
  people.filter(function(p){return p.status!=='inactive';}).sort(function(a,b){
    return personName(a).localeCompare(personName(b));
  }).forEach(function(p){
    var opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = personName(p) + ' (' + p.section + ')';
    if (p.id === personId) opt.selected = true;
    sel.appendChild(opt);
  });

  document.getElementById('aRole').value = '';
  document.getElementById('aRate').value = '';
  document.getElementById('aConfirmed').value = 'no';
  document.getElementById('aNotes').value = '';
  document.getElementById('shiftRows').innerHTML = '';
  addShiftRow();

  // Show previous event reference
  showPrevRef(personId || sel.value);
  sel.onchange = function(){ showPrevRef(this.value); };

  document.getElementById('assignOverlay').classList.add('open');
}

function openEditAssign(personId) {
  var assign = assignments.find(function(a){return a.personId===personId && a.event===CURRENT_EVENT;});
  if (!assign) { openAssignPerson(personId); return; }

  _editingAssignId = assign.id;
  document.getElementById('assignTitle').textContent = 'Edit FD7 assignment';
  document.getElementById('aDeleteBtn').style.display = 'block';

  var sel = document.getElementById('aPersonId');
  sel.innerHTML = '';
  people.filter(function(p){return p.status!=='inactive';}).forEach(function(p){
    var opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = personName(p);
    if (p.id === personId) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.disabled = true;

  document.getElementById('aRole').value = assign.role||'';
  document.getElementById('aRate').value = assign.rate||'';
  document.getElementById('aConfirmed').value = assign.confirmed||'no';
  document.getElementById('aNotes').value = assign.notes||'';

  var rows = document.getElementById('shiftRows');
  rows.innerHTML = '';
  (assign.shifts||[{date:'2026-08-15',start:'',end:''}]).forEach(function(s){
    addShiftRow(s);
  });

  showPrevRef(personId);
  document.getElementById('assignOverlay').classList.add('open');
}

function showPrevRef(personId) {
  var p = people.find(function(p2){return p2.id===personId;});
  var ref = document.getElementById('aPrevRef');
  if (!p) { ref.style.display='none'; return; }

  // Find last event assignment for this person (not FD7)
  var lastAssign = assignments.filter(function(a){return a.personId===personId && a.event!==CURRENT_EVENT;}).slice(-1)[0];
  if (!lastAssign) {
    ref.style.display='none';
    return;
  }
  document.getElementById('aPrevEvent').textContent = '— ' + lastAssign.event;
  document.getElementById('aPrevDetail').textContent = lastAssign.role + (lastAssign.rate?' · £'+lastAssign.rate+'/hr':'') + ' (reference only — not carried forward)';
  ref.style.display = 'block';
}

function addShiftRow(shift) {
  var rows = document.getElementById('shiftRows');
  var div = document.createElement('div');
  div.className = 'shift-row';
  div.innerHTML = '<span style="font-size:11px;color:#64748b;white-space:nowrap">15 Aug</span>' +
    '<input type="time" class="shift-start" value="' + (shift&&shift.start||'') + '" placeholder="Start">' +
    '<input type="time" class="shift-end" value="' + (shift&&shift.end||'') + '" placeholder="End">' +
    '<button class="shift-del" onclick="this.parentElement.remove()">&#215;</button>';
  rows.appendChild(div);
}

function closeAssignForm() {
  document.getElementById('assignOverlay').classList.remove('open');
  document.getElementById('aPersonId').disabled = false;
}

function saveAssignment() {
  var personId = document.getElementById('aPersonId').value;
  var role = document.getElementById('aRole').value.trim();
  if (!role) { alert('Role is required'); return; }

  var shifts = [];
  document.querySelectorAll('#shiftRows .shift-row').forEach(function(row){
    var start = row.querySelector('.shift-start').value;
    var end = row.querySelector('.shift-end').value;
    if (start || end) shifts.push({date: CURRENT_EVENT_DATE, start:start, end:end});
  });

  var assignData = {
    personId: personId,
    event: CURRENT_EVENT,
    role: role,
    rate: parseFloat(document.getElementById('aRate').value)||0,
    confirmed: document.getElementById('aConfirmed').value,
    shifts: shifts,
    notes: document.getElementById('aNotes').value.trim(),
  };

  if (_editingAssignId) {
    var idx = assignments.findIndex(function(a){return a.id===_editingAssignId;});
    if (idx >= 0) { assignData.id = _editingAssignId; assignments[idx] = assignData; }
  } else {
    // Remove existing FD7 assignment for this person if any
    assignments = assignments.filter(function(a){return !(a.personId===personId && a.event===CURRENT_EVENT);});
    assignData.id = 'a_' + personId + '_' + CURRENT_EVENT + '_' + Date.now();
    assignments.push(assignData);
  }

  // Update person's event history
  var p = people.find(function(p2){return p2.id===personId;});
  if (p && !(p.history||[]).includes(CURRENT_EVENT)) {
    p.history = (p.history||[]).concat([CURRENT_EVENT]);
    savePeople();
  }

  saveAssignments();
  render();
  closeAssignForm();
  notify('Assignment saved');
}

function deleteAssignment() {
  if (!_editingAssignId) return;
  if (!confirm('Remove this person from FD7?')) return;
  assignments = assignments.filter(function(a){return a.id!==_editingAssignId;});
  saveAssignments();
  render();
  closeAssignForm();
  notify('Removed from FD7');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function notify(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(function(){ t.style.opacity='0'; }, 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', load);
} else { load(); }
</script>

// Post version to hub statusbar
(function() {
  var VERSION_STR = 'FD Event Planner · Staff v2.6.0';
  function postVersion() { try { window.parent.postMessage({type:'fd_version', version: VERSION_STR}, '*'); } catch(e){} }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', postVersion); }
  else { postVersion(); }
})();
</script>
